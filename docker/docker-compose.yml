services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bridgeai-postgres
    environment:
      POSTGRES_DB: bridgeai
      POSTGRES_USER: bridgeai
      POSTGRES_PASSWORD: bridgeai_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgeai -d bridgeai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bridgeai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: bridgeai-minio
    environment:
      MINIO_ROOT_USER: bridgeai
      MINIO_ROOT_PASSWORD: bridgeai_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bridgeai-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bridgeai-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bridgeai:bridgeai_dev@postgres:5432/bridgeai
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: bridgeai
      MINIO_SECRET_KEY: bridgeai_dev
      DEEPSEEK_API_KEY: sk-1acff979ec8d416999ab468b9ac3598b
      JWT_SECRET: bridgeai_jwt_secret_dev
      HTTP_PROXY: http://host.docker.internal:1087
      HTTPS_PROXY: http://host.docker.internal:1087
      NO_PROXY: postgres,redis,minio,localhost,127.0.0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  bridgeai-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bridgeai-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://bridgeai-api:8000
    depends_on:
      bridgeai-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
