apiVersion: v1
kind: Service
metadata:
  name: {{ include "bridgeai.fullname" . }}-web
  labels:
    {{- include "bridgeai.labels" . | nindent 4 }}
    {{- include "bridgeai.web.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bridgeai.web.selectorLabels" . | nindent 4 }}
