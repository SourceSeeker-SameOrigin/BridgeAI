apiVersion: v1
kind: Service
metadata:
  name: {{ include "bridgeai.fullname" . }}-api
  labels:
    {{- include "bridgeai.labels" . | nindent 4 }}
    {{- include "bridgeai.api.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bridgeai.api.selectorLabels" . | nindent 4 }}
