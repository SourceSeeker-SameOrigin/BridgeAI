apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bridgeai.fullname" . }}-web
  labels:
    {{- include "bridgeai.labels" . | nindent 4 }}
    {{- include "bridgeai.web.selectorLabels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.web.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "bridgeai.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bridgeai.web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          env:
            - name: VITE_API_TARGET
              value: "http://{{ include "bridgeai.fullname" . }}-api:{{ .Values.service.api.port }}"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
