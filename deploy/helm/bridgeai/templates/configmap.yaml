apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bridgeai.fullname" . }}-config
  labels:
    {{- include "bridgeai.labels" . | nindent 4 }}
data:
  APP_NAME: "BridgeAI"
  APP_VERSION: {{ .Chart.AppVersion | quote }}
  JWT_ALGORITHM: {{ .Values.jwt.algorithm | quote }}
  JWT_EXPIRE_MINUTES: {{ .Values.jwt.expireMinutes | quote }}
  MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  DATABASE_URL: {{ .Values.database.url | quote }}
