apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bridgeai.fullname" . }}-secret
  labels:
    {{- include "bridgeai.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.jwt.secret | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.accessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.secretKey | b64enc | quote }}
  {{- if .Values.llm.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .Values.llm.deepseekApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.llm.qwenApiKey }}
  QWEN_API_KEY: {{ .Values.llm.qwenApiKey | b64enc | quote }}
  {{- end }}
