<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.4)"/></filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
  </defs>
  <rect width="1400" height="900" fill="#0a0e1a"/>
  <text x="700" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="22" font-weight="700">处理管线详细设计</text>
  <text x="700" y="55" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12">Pipeline Detailed Architecture - 6 Stages</text>

  <!-- Stage 1 -->
  <rect x="30" y="75" width="420" height="380" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="75" width="420" height="32" rx="12" fill="#3b82f6" fill-opacity="0.15"/>
  <rect x="30" y="95" width="420" height="12" fill="#111827"/>
  <text x="50" y="98" fill="#3b82f6" font-family="system-ui" font-size="16" font-weight="700">&#x2460; 上下文构建</text>
  <text x="220" y="98" fill="#94a3b8" font-family="system-ui" font-size="11">Context Build</text>
  <rect x="50" y="120" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="144" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">Tenant Resolution</text>
  <text x="410" y="144" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">X-Tenant-ID</text>
  <rect x="50" y="166" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="190" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">User Authentication</text>
  <text x="410" y="190" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">JWT decode</text>
  <rect x="50" y="212" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="236" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">Content Filter</text>
  <text x="410" y="236" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">敏感词/安全检测</text>
  <rect x="50" y="258" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="282" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">History Load</text>
  <text x="410" y="282" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">会话历史 + 记忆</text>
  <rect x="50" y="304" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="328" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">Agent Config Load</text>
  <text x="410" y="328" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">工具/插件/知识库</text>
  <rect x="50" y="350" width="380" height="38" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="374" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">Few-shot Examples</text>
  <text x="410" y="374" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">Redis ZSET top-K</text>
  <rect x="50" y="400" width="380" height="40" rx="8" fill="#3b82f6" fill-opacity="0.08"/>
  <text x="240" y="425" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">output: PipelineContext</text>

  <line x1="450" y1="265" x2="480" y2="265" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Stage 2 -->
  <rect x="490" y="75" width="420" height="380" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="490" y="75" width="420" height="32" rx="12" fill="#6366f1" fill-opacity="0.15"/>
  <rect x="490" y="95" width="420" height="12" fill="#111827"/>
  <text x="510" y="98" fill="#6366f1" font-family="system-ui" font-size="16" font-weight="700">&#x2461; 提示词组装</text>
  <text x="680" y="98" fill="#94a3b8" font-family="system-ui" font-size="11">Prompt Compose</text>
  <rect x="510" y="120" width="380" height="48" rx="8" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="520" y="140" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">Layer 1</text>
  <text x="590" y="140" fill="#f1f5f9" font-family="system-ui" font-size="10">System Prompt</text>
  <text x="520" y="157" fill="#94a3b8" font-family="system-ui" font-size="9">角色定义 + 行为约束 + 输出格式</text>
  <rect x="510" y="176" width="380" height="48" rx="8" fill="#0f1729" stroke="#6366f1" stroke-width="1.5"/>
  <text x="520" y="196" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">Layer 2</text>
  <text x="590" y="196" fill="#f1f5f9" font-family="system-ui" font-size="10">Knowledge Context</text>
  <text x="520" y="213" fill="#94a3b8" font-family="system-ui" font-size="9">RAG 检索结果 + 知识库片段</text>
  <rect x="510" y="232" width="380" height="48" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="520" y="252" fill="#8b5cf6" font-family="system-ui" font-size="10" font-weight="700">Layer 3</text>
  <text x="590" y="252" fill="#f1f5f9" font-family="system-ui" font-size="10">Tool Definitions</text>
  <text x="520" y="269" fill="#94a3b8" font-family="system-ui" font-size="9">MCP + 插件 + 内置工具 JSON Schema</text>
  <rect x="510" y="288" width="380" height="48" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="520" y="308" fill="#8b5cf6" font-family="system-ui" font-size="10" font-weight="700">Layer 4</text>
  <text x="590" y="308" fill="#f1f5f9" font-family="system-ui" font-size="10">Few-shot Examples</text>
  <text x="520" y="325" fill="#94a3b8" font-family="system-ui" font-size="9">高评分对话样本 (Redis ZSET)</text>
  <rect x="510" y="344" width="380" height="48" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1.5"/>
  <text x="520" y="364" fill="#22c55e" font-family="system-ui" font-size="10" font-weight="700">Layer 5</text>
  <text x="590" y="364" fill="#f1f5f9" font-family="system-ui" font-size="10">Conversation History</text>
  <text x="520" y="381" fill="#94a3b8" font-family="system-ui" font-size="9">滑动窗口 + 记忆摘要</text>
  <rect x="510" y="400" width="380" height="40" rx="8" fill="#6366f1" fill-opacity="0.08"/>
  <text x="700" y="425" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">output: messages[] + tools[]</text>

  <line x1="910" y1="265" x2="940" y2="265" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Stage 3 -->
  <rect x="950" y="75" width="420" height="380" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="950" y="75" width="420" height="32" rx="12" fill="#8b5cf6" fill-opacity="0.15"/>
  <rect x="950" y="95" width="420" height="12" fill="#111827"/>
  <text x="970" y="98" fill="#8b5cf6" font-family="system-ui" font-size="16" font-weight="700">&#x2462; 模型路由</text>
  <text x="1120" y="98" fill="#94a3b8" font-family="system-ui" font-size="11">Model Routing</text>
  <rect x="970" y="120" width="380" height="42" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1"/>
  <text x="990" y="146" fill="#8b5cf6" font-family="system-ui" font-size="11" font-weight="600">1. Agent Config Check</text>
  <text x="1330" y="146" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">指定模型优先</text>
  <rect x="970" y="170" width="380" height="42" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1"/>
  <text x="990" y="196" fill="#8b5cf6" font-family="system-ui" font-size="11" font-weight="600">2. Tool Capability Match</text>
  <text x="1330" y="196" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">需工具调用?</text>
  <rect x="970" y="220" width="380" height="42" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1"/>
  <text x="990" y="246" fill="#8b5cf6" font-family="system-ui" font-size="11" font-weight="600">3. Cost/Latency Optimize</text>
  <text x="1330" y="246" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">成本/延迟权衡</text>
  <rect x="970" y="270" width="380" height="42" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1"/>
  <text x="990" y="296" fill="#8b5cf6" font-family="system-ui" font-size="11" font-weight="600">4. Provider Health Check</text>
  <text x="1330" y="296" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">熔断器状态</text>
  <rect x="970" y="320" width="380" height="42" rx="8" fill="#0f1729" stroke="#f59e0b" stroke-width="1"/>
  <text x="990" y="346" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">5. Fallback Chain</text>
  <text x="1330" y="346" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">降级链路选择</text>
  <rect x="970" y="400" width="380" height="40" rx="8" fill="#8b5cf6" fill-opacity="0.08"/>
  <text x="1160" y="425" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">output: provider + model + params</text>

  <!-- Arrow row1→row2 -->
  <path d="M1160,455 L1160,485 L240,485 L240,510" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
  <polygon points="235,507 240,517 245,507" fill="#8b5cf6"/>

  <!-- Stage 4 -->
  <rect x="30" y="520" width="440" height="350" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="520" width="440" height="32" rx="12" fill="#f59e0b" fill-opacity="0.15"/>
  <rect x="30" y="540" width="440" height="12" fill="#111827"/>
  <text x="50" y="543" fill="#f59e0b" font-family="system-ui" font-size="16" font-weight="700">&#x2463; 工具执行</text>
  <text x="200" y="543" fill="#94a3b8" font-family="system-ui" font-size="11">Tool Execute Loop</text>
  <rect x="50" y="560" width="400" height="38" rx="8" fill="#0f1729" stroke="#ef4444" stroke-width="1.5"/>
  <text x="70" y="584" fill="#ef4444" font-family="system-ui" font-size="11" font-weight="600">CircuitBreaker</text>
  <text x="430" y="584" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">CLOSED / OPEN / HALF_OPEN</text>
  <rect x="50" y="606" width="400" height="38" rx="8" fill="#0f1729" stroke="#f59e0b" stroke-width="1"/>
  <text x="70" y="630" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">LLM Call + Tool Decision</text>
  <text x="430" y="630" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">max 10 iterations</text>
  <path d="M430,625 Q455,625 455,610 Q455,595 430,595" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <text x="462" y="612" fill="#f59e0b" font-family="system-ui" font-size="8">loop</text>
  <rect x="50" y="656" width="195" height="40" rx="8" fill="#0f1729" stroke="#8b5cf6" stroke-width="1"/>
  <text x="147" y="672" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="10" font-weight="600">MCP Tools</text>
  <text x="147" y="688" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">外部MCP服务</text>
  <rect x="255" y="656" width="195" height="40" rx="8" fill="#0f1729" stroke="#6366f1" stroke-width="1"/>
  <text x="352" y="672" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="600">Plugin Tools</text>
  <text x="352" y="688" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">行业插件</text>
  <rect x="50" y="706" width="195" height="40" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1"/>
  <text x="147" y="722" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10" font-weight="600">RAG Search</text>
  <text x="147" y="738" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">知识库检索</text>
  <rect x="255" y="706" width="195" height="40" rx="8" fill="#0f1729" stroke="#3b82f6" stroke-width="1"/>
  <text x="352" y="722" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="10" font-weight="600">Delegation</text>
  <text x="352" y="738" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="8">委派子Agent</text>
  <rect x="50" y="760" width="400" height="30" rx="8" fill="#f59e0b" fill-opacity="0.08"/>
  <text x="250" y="780" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">output: final response + tool_calls[]</text>

  <line x1="470" y1="695" x2="500" y2="695" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Stage 5 -->
  <rect x="510" y="520" width="420" height="350" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="510" y="520" width="420" height="32" rx="12" fill="#22c55e" fill-opacity="0.15"/>
  <rect x="510" y="540" width="420" height="12" fill="#111827"/>
  <text x="530" y="543" fill="#22c55e" font-family="system-ui" font-size="16" font-weight="700">&#x2464; 后处理</text>
  <text x="650" y="543" fill="#94a3b8" font-family="system-ui" font-size="11">Post Processing</text>
  <rect x="530" y="560" width="380" height="42" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1"/>
  <text x="550" y="586" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">Content Split</text>
  <text x="890" y="586" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">分离 content / analysis</text>
  <rect x="530" y="610" width="380" height="42" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1"/>
  <text x="550" y="636" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">DB Persist</text>
  <text x="890" y="636" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">messages / tool_calls / usage</text>
  <rect x="530" y="660" width="380" height="42" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1"/>
  <text x="550" y="686" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">Memory Write</text>
  <text x="890" y="686" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">L1 session / L2 user / L3 global</text>
  <rect x="530" y="710" width="380" height="42" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1"/>
  <text x="550" y="736" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">Usage Billing</text>
  <text x="890" y="736" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">token统计 + 费用计算</text>
  <rect x="530" y="760" width="380" height="30" rx="8" fill="#22c55e" fill-opacity="0.08"/>
  <text x="720" y="780" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">output: streamed response + persisted</text>

  <line x1="930" y1="695" x2="960" y2="695" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Stage 6 -->
  <rect x="970" y="520" width="400" height="350" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="970" y="520" width="400" height="32" rx="12" fill="#f59e0b" fill-opacity="0.15"/>
  <rect x="970" y="540" width="400" height="12" fill="#111827"/>
  <text x="990" y="543" fill="#f59e0b" font-family="system-ui" font-size="16" font-weight="700">&#x2465; 反馈学习</text>
  <text x="1140" y="543" fill="#94a3b8" font-family="system-ui" font-size="11">Feedback Loop</text>
  <rect x="990" y="560" width="360" height="48" rx="8" fill="#0f1729" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1010" y="584" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">User Rating</text>
  <text x="1330" y="584" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">1-5 stars + feedback text</text>
  <rect x="990" y="616" width="360" height="48" rx="8" fill="#0f1729" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1010" y="640" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">Score to Redis ZSET</text>
  <text x="1330" y="640" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">fewshot:{agent_id}</text>
  <rect x="990" y="672" width="360" height="48" rx="8" fill="#0f1729" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1010" y="696" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">Top-K Selection</text>
  <text x="1330" y="696" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">ZREVRANGE 取高分</text>
  <rect x="990" y="728" width="360" height="48" rx="8" fill="#0f1729" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1010" y="752" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">Inject as Few-shot</text>
  <text x="1330" y="752" text-anchor="end" fill="#94a3b8" font-family="system-ui" font-size="9">下次对话 Stage 2</text>
  <!-- Feedback loop arrow -->
  <path d="M1170,776 L1170,860 L240,860 L240,455" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="235,460 240,450 245,460" fill="#f59e0b"/>
  <text x="700" y="878" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="10">feedback loop back to Stage 2</text>
</svg>