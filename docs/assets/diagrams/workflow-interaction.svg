<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="wi-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="wi-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="wi-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="wi-arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="wi-arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#wi-bg)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Workflow 交互流程</text>
  <text x="600" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">Workflow Interaction Flow - 10 Steps</text>

  <!-- Phase labels -->
  <text x="280" y="85" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="600" opacity="0.7">创建节点</text>
  <line x1="40" y1="92" x2="520" y2="92" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>

  <text x="680" y="85" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600" opacity="0.7">连接节点</text>
  <line x1="540" y1="92" x2="820" y2="92" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>

  <text x="1000" y="85" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600" opacity="0.7">配置与保存</text>
  <line x1="840" y1="92" x2="1160" y2="92" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

  <!-- Step 1 -->
  <circle cx="80" cy="140" r="16" fill="#6366f1" filter="url(#wi-shadow)"/>
  <text x="80" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">1</text>
  <rect x="30" y="165" width="100" height="55" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="80" y="187" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">拖拽节点</text>
  <text x="80" y="205" text-anchor="middle" fill="#64748b" font-size="9">NodePalette</text>
  <line x1="130" y1="190" x2="160" y2="190" stroke="#6366f1" stroke-width="1.5" marker-end="url(#wi-arrow)"/>

  <!-- Step 2 -->
  <circle cx="200" cy="140" r="16" fill="#6366f1" filter="url(#wi-shadow)"/>
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
  <rect x="150" y="165" width="100" height="55" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="200" y="187" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">onDrop</text>
  <text x="200" y="205" text-anchor="middle" fill="#64748b" font-size="9">创建节点数据</text>
  <line x1="250" y1="190" x2="280" y2="190" stroke="#6366f1" stroke-width="1.5" marker-end="url(#wi-arrow)"/>

  <!-- Step 3 -->
  <circle cx="320" cy="140" r="16" fill="#6366f1" filter="url(#wi-shadow)"/>
  <text x="320" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">3</text>
  <rect x="270" y="165" width="100" height="55" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="320" y="187" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">ReactFlow</text>
  <text x="320" y="205" text-anchor="middle" fill="#64748b" font-size="9">渲染到画布</text>
  <line x1="370" y1="190" x2="400" y2="190" stroke="#6366f1" stroke-width="1.5" marker-end="url(#wi-arrow)"/>

  <!-- Step 4 -->
  <circle cx="440" cy="140" r="16" fill="#6366f1" filter="url(#wi-shadow)"/>
  <text x="440" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">4</text>
  <rect x="390" y="165" width="100" height="55" rx="10" fill="#111827" stroke="#22c55e" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="440" y="187" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">拖拽连线</text>
  <text x="440" y="205" text-anchor="middle" fill="#64748b" font-size="9">Handle → Handle</text>
  <line x1="490" y1="190" x2="520" y2="190" stroke="#22c55e" stroke-width="1.5" marker-end="url(#wi-arrow-green)"/>

  <!-- Step 5 -->
  <circle cx="560" cy="140" r="16" fill="#22c55e" filter="url(#wi-shadow)"/>
  <text x="560" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">5</text>
  <rect x="510" y="165" width="100" height="55" rx="10" fill="#111827" stroke="#22c55e" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="560" y="187" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">onConnect</text>
  <text x="560" y="205" text-anchor="middle" fill="#64748b" font-size="9">创建边数据</text>

  <!-- Row 2 - Steps 6-10 -->
  <!-- Step 6 -->
  <circle cx="560" cy="290" r="16" fill="#22c55e" filter="url(#wi-shadow)"/>
  <text x="560" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">6</text>
  <rect x="510" y="315" width="100" height="55" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="560" y="337" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">点击节点</text>
  <text x="560" y="355" text-anchor="middle" fill="#64748b" font-size="9">onNodeClick</text>
  <!-- Down arrow from step 5 to step 6 -->
  <line x1="560" y1="220" x2="560" y2="274" stroke="#22c55e" stroke-width="1.5" marker-end="url(#wi-arrow-green)"/>
  <line x1="610" y1="340" x2="640" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#wi-arrow-orange)"/>

  <!-- Step 7 -->
  <circle cx="680" cy="290" r="16" fill="#f59e0b" filter="url(#wi-shadow)"/>
  <text x="680" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">7</text>
  <rect x="630" y="315" width="100" height="55" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="680" y="337" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">ConfigPanel</text>
  <text x="680" y="355" text-anchor="middle" fill="#64748b" font-size="9">展示配置</text>
  <line x1="730" y1="340" x2="760" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#wi-arrow-orange)"/>

  <!-- Step 8 -->
  <circle cx="800" cy="290" r="16" fill="#f59e0b" filter="url(#wi-shadow)"/>
  <text x="800" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">8</text>
  <rect x="750" y="315" width="100" height="55" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="800" y="337" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">编辑保存</text>
  <text x="800" y="355" text-anchor="middle" fill="#64748b" font-size="9">表单提交</text>
  <line x1="850" y1="340" x2="880" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#wi-arrow-orange)"/>

  <!-- Step 9 -->
  <circle cx="920" cy="290" r="16" fill="#f59e0b" filter="url(#wi-shadow)"/>
  <text x="920" y="295" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">9</text>
  <rect x="870" y="315" width="100" height="55" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1" filter="url(#wi-shadow)"/>
  <text x="920" y="335" text-anchor="middle" fill="#f1f5f9" font-size="10" font-weight="600">toBackend</text>
  <text x="920" y="350" text-anchor="middle" fill="#f1f5f9" font-size="10" font-weight="600">Payload()</text>
  <text x="920" y="365" text-anchor="middle" fill="#64748b" font-size="8">格式转换</text>
  <line x1="970" y1="340" x2="1000" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#wi-arrow-orange)"/>

  <!-- Step 10 -->
  <circle cx="1040" cy="290" r="16" fill="#ef4444" filter="url(#wi-shadow)"/>
  <text x="1040" y="295" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">10</text>
  <rect x="990" y="315" width="110" height="55" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#wi-shadow)"/>
  <text x="1045" y="335" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">PUT</text>
  <text x="1045" y="352" text-anchor="middle" fill="#f1f5f9" font-size="9">/workflows/{id}</text>
  <text x="1045" y="365" text-anchor="middle" fill="#64748b" font-size="8">API 持久化</text>

  <!-- Bottom note -->
  <rect x="40" y="430" width="1120" height="50" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" opacity="0.6"/>
  <text x="600" y="455" text-anchor="middle" fill="#94a3b8" font-size="11">完整交互链路: 用户拖拽创建节点 → 连线定义数据流 → 点击配置参数 → 转换格式后持久化到后端</text>
  <text x="600" y="472" text-anchor="middle" fill="#64748b" font-size="10">所有操作均为实时保存，支持撤销/重做 (Ctrl+Z / Ctrl+Shift+Z)</text>
</svg>