<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="i18n-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="i18n-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="i18n-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="i18n-arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#i18n-bg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">i18n 国际化架构</text>
  <text x="400" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">Internationalization Architecture - i18next + react-i18next</text>

  <!-- main.tsx -->
  <rect x="30" y="80" width="130" height="42" rx="12" fill="#6366f1" filter="url(#i18n-shadow)"/>
  <text x="95" y="106" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">main.tsx</text>

  <line x1="160" y1="101" x2="195" y2="101" stroke="#6366f1" stroke-width="1.5" marker-end="url(#i18n-arrow)"/>
  <text x="177" y="95" text-anchor="middle" fill="#64748b" font-size="8">import</text>

  <!-- i18n/index.ts -->
  <rect x="198" y="80" width="160" height="42" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#i18n-shadow)"/>
  <text x="278" y="100" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="700">i18n/index.ts</text>
  <text x="278" y="116" text-anchor="middle" fill="#64748b" font-size="9">初始化配置</text>

  <!-- Arrow to i18next -->
  <line x1="358" y1="101" x2="398" y2="101" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#i18n-arrow)"/>

  <!-- i18next + react-i18next -->
  <rect x="400" y="75" width="190" height="52" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#i18n-shadow)"/>
  <text x="495" y="98" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="700">i18next</text>
  <text x="495" y="116" text-anchor="middle" fill="#8b5cf6" font-size="10">+ react-i18next</text>

  <!-- Branches to language files -->
  <line x1="495" y1="127" x2="370" y2="170" stroke="#22c55e" stroke-width="1.5" marker-end="url(#i18n-arrow-green)"/>
  <line x1="495" y1="127" x2="620" y2="170" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#i18n-arrow)"/>

  <!-- zh.json -->
  <rect x="290" y="172" width="160" height="65" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#i18n-shadow)"/>
  <text x="370" y="196" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">zh.json</text>
  <text x="370" y="214" text-anchor="middle" fill="#94a3b8" font-size="10">~200 keys</text>
  <text x="370" y="229" text-anchor="middle" fill="#64748b" font-size="9">简体中文</text>

  <!-- en.json -->
  <rect x="540" y="172" width="160" height="65" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#i18n-shadow)"/>
  <text x="620" y="196" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="700">en.json</text>
  <text x="620" y="214" text-anchor="middle" fill="#94a3b8" font-size="10">~200 keys</text>
  <text x="620" y="229" text-anchor="middle" fill="#64748b" font-size="9">English</text>

  <!-- localStorage persistence -->
  <rect x="30" y="172" width="210" height="50" rx="12" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1" filter="url(#i18n-shadow)"/>
  <text x="135" y="195" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">localStorage</text>
  <text x="135" y="213" text-anchor="middle" fill="#64748b" font-size="10">'bridgeai-lang' = 'zh' | 'en'</text>

  <line x1="240" y1="197" x2="278" y2="197" stroke="#f59e0b" stroke-width="1" opacity="0.5" stroke-dasharray="4,2"/>
  <text x="259" y="191" text-anchor="middle" fill="#64748b" font-size="7">读取</text>

  <!-- Components usage -->
  <rect x="130" y="280" width="540" height="90" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#i18n-shadow)"/>
  <text x="400" y="305" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">React 组件使用</text>
  <line x1="150" y1="312" x2="650" y2="312" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>

  <!-- useTranslation -->
  <rect x="155" y="322" width="200" height="30" rx="8" fill="#0a0e1a" stroke="#6366f1" stroke-width="1"/>
  <text x="255" y="341" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="600">useTranslation()</text>

  <text x="368" y="341" fill="#94a3b8" font-size="12">→</text>

  <rect x="385" y="322" width="120" height="30" rx="8" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="445" y="341" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">t('key')</text>

  <text x="518" y="341" fill="#94a3b8" font-size="12">→</text>

  <text x="570" y="341" fill="#f1f5f9" font-size="11">"翻译文本"</text>

  <!-- Arrow from i18next down to components -->
  <line x1="495" y1="127" x2="400" y2="278" stroke="#94a3b8" stroke-width="1" opacity="0.3" stroke-dasharray="4,2"/>

  <!-- Ant Design ConfigProvider -->
  <rect x="610" y="85" width="170" height="38" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1" filter="url(#i18n-shadow)"/>
  <text x="695" y="105" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">ConfigProvider</text>
  <text x="695" y="118" text-anchor="middle" fill="#64748b" font-size="9">locale={zhCN}</text>

  <!-- Connection line -->
  <line x1="590" y1="95" x2="610" y2="100" stroke="#ef4444" stroke-width="1" opacity="0.4"/>

  <!-- Key examples -->
  <rect x="30" y="250" width="80" height="22" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="70" y="265" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">示例</text>
  <text x="30" y="290" fill="#64748b" font-size="9">chat.send → "发送" / "Send"</text>
  <text x="30" y="306" fill="#64748b" font-size="9">nav.agents → "智能体" / "Agents"</text>
  <text x="30" y="322" fill="#64748b" font-size="9">settings.title → "设置" / "Settings"</text>
</svg>