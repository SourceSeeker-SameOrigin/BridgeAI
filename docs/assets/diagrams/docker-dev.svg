<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dd-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <marker id="dd-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="dd-arr-y" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="1000" height="600" fill="url(#dd-bg)"/>
  <text x="500" y="40" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">Docker Compose 开发拓扑</text>
  <text x="500" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">Local Development Environment</text>

  <!-- docker-compose boundary -->
  <rect x="30" y="80" width="940" height="490" rx="16" fill="none" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="500" y="102" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="600" fill-opacity="0.5">docker-compose.yml</text>

  <!-- postgres -->
  <rect x="60" y="130" width="240" height="160" rx="12" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="80" y="145" width="200" height="35" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="180" y="168" fill="#3b82f6" font-size="14" font-weight="700" text-anchor="middle">PostgreSQL</text>
  <text x="180" y="205" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">:5432</text>
  <rect x="80" y="220" width="200" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="180" y="237" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="monospace">pgdata:/var/lib/postgresql</text>
  <rect x="80" y="252" width="200" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="180" y="269" fill="#94a3b8" font-size="10" text-anchor="middle">+ pgvector extension</text>

  <!-- redis -->
  <rect x="60" y="320" width="240" height="130" rx="12" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="80" y="335" width="200" height="35" rx="6" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="180" y="358" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">Redis</text>
  <text x="180" y="395" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">:6379</text>
  <rect x="80" y="410" width="200" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="180" y="427" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="monospace">redis_data:/data</text>

  <!-- minio -->
  <rect x="380" y="130" width="240" height="160" rx="12" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="400" y="145" width="200" height="35" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="500" y="168" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">MinIO</text>
  <text x="500" y="205" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">:9000 / :9001</text>
  <text x="500" y="225" fill="#94a3b8" font-size="10" text-anchor="middle">API / Console</text>
  <rect x="400" y="240" width="200" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="500" y="257" fill="#94a3b8" font-size="10" text-anchor="middle" font-family="monospace">minio_data:/data</text>
  <text x="500" y="280" fill="#94a3b8" font-size="10" text-anchor="middle">S3-compatible storage</text>

  <!-- bridgeai-api -->
  <rect x="700" y="130" width="250" height="190" rx="12" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="720" y="145" width="210" height="35" rx="6" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4"/>
  <text x="825" y="168" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">bridgeai-api</text>
  <text x="825" y="205" fill="#f1f5f9" font-size="15" text-anchor="middle" font-weight="700">:8000</text>
  <text x="825" y="228" fill="#94a3b8" font-size="11" text-anchor="middle">FastAPI + Uvicorn</text>
  <text x="825" y="248" fill="#94a3b8" font-size="11" text-anchor="middle">hot-reload enabled</text>
  <rect x="720" y="262" width="210" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="825" y="279" fill="#f59e0b" font-size="10" text-anchor="middle">depends_on: postgres, redis, minio</text>
  <rect x="720" y="294" width="210" height="20" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="825" y="308" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="monospace">./backend:/app (bind mount)</text>

  <!-- bridgeai-web -->
  <rect x="700" y="350" width="250" height="130" rx="12" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="2"/>
  <rect x="720" y="365" width="210" height="35" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4"/>
  <text x="825" y="388" fill="#8b5cf6" font-size="14" font-weight="700" text-anchor="middle">bridgeai-web</text>
  <text x="825" y="425" fill="#f1f5f9" font-size="15" text-anchor="middle" font-weight="700">:5173</text>
  <text x="825" y="448" fill="#94a3b8" font-size="11" text-anchor="middle">Vite dev server + HMR</text>
  <rect x="720" y="460" width="210" height="16" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="825" y="472" fill="#94a3b8" font-size="9" text-anchor="middle" font-family="monospace">./frontend:/app (bind mount)</text>

  <!-- depends_on arrows -->
  <path d="M700 220 L620 210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#dd-arr-y)" stroke-dasharray="5,3"/>
  <path d="M700 250 L300 210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#dd-arr)" stroke-dasharray="5,3"/>
  <path d="M700 280 L300 370" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Port mappings at bottom -->
  <rect x="180" y="500" width="640" height="50" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="500" y="522" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">Host Port Mappings</text>
  <text x="500" y="540" fill="#94a3b8" font-size="11" text-anchor="middle">localhost:5432 | localhost:6379 | localhost:9000/9001 | localhost:8000 | localhost:5173</text>
</svg>