<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="fm-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="fm-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1000" height="400" fill="url(#fm-bg)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">字段映射关系</text>
  <text x="500" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">Backend (snake_case) → Frontend (camelCase) Field Mapping</text>

  <!-- Left panel: Backend -->
  <rect x="50" y="75" width="280" height="290" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1" filter="url(#fm-shadow)"/>
  <text x="190" y="100" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">Backend (snake_case)</text>
  <line x1="70" y1="110" x2="310" y2="110" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>

  <text x="80" y="140" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">model_config</text>
  <text x="80" y="175" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">knowledge_base_id</text>
  <text x="80" y="210" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">connector_type</text>
  <text x="80" y="245" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">created_at</text>
  <text x="80" y="280" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">endpoint_url</text>
  <text x="80" y="315" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">is_active</text>
  <text x="80" y="345" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">tool_definitions</text>

  <!-- Center: Mapper functions -->
  <rect x="390" y="100" width="220" height="240" rx="12" fill="#0a0e1a" stroke="#6366f1" stroke-width="1.5" filter="url(#fm-shadow)"/>
  <text x="500" y="125" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="700">Mapper Functions</text>
  <line x1="410" y1="135" x2="590" y2="135" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>

  <rect x="420" y="150" width="160" height="28" rx="8" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="500" y="169" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="600">mapAgent()</text>

  <rect x="420" y="190" width="160" height="28" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="209" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">mapConnector()</text>

  <rect x="420" y="230" width="160" height="28" rx="8" fill="#111827" stroke="#22c55e" stroke-width="1"/>
  <text x="500" y="249" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">mapWorkflow()</text>

  <rect x="420" y="270" width="160" height="28" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="289" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">mapKnowledgeBase()</text>

  <!-- Right panel: Frontend -->
  <rect x="670" y="75" width="280" height="290" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1" filter="url(#fm-shadow)"/>
  <text x="810" y="100" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">Frontend (camelCase)</text>
  <line x1="690" y1="110" x2="930" y2="110" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>

  <text x="700" y="140" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">modelConfig</text>
  <text x="700" y="175" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">knowledgeBaseId</text>
  <text x="700" y="210" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">type</text>
  <text x="700" y="245" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">createdAt</text>
  <text x="700" y="280" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">endpoint</text>
  <text x="700" y="315" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">isActive</text>
  <text x="700" y="345" fill="#f1f5f9" font-size="12" font-weight="500" font-style="italic">toolDefinitions</text>

  <!-- Arrows left to center -->
  <line x1="330" y1="137" x2="388" y2="164" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="172" x2="388" y2="164" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="207" x2="388" y2="204" stroke="#8b5cf6" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="242" x2="388" y2="244" stroke="#22c55e" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="277" x2="388" y2="204" stroke="#8b5cf6" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="312" x2="388" y2="164" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="330" y1="342" x2="388" y2="164" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>

  <!-- Arrows center to right -->
  <line x1="612" y1="164" x2="668" y2="137" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="164" x2="668" y2="172" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="204" x2="668" y2="207" stroke="#8b5cf6" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="244" x2="668" y2="242" stroke="#22c55e" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="204" x2="668" y2="277" stroke="#8b5cf6" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="164" x2="668" y2="312" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
  <line x1="612" y1="164" x2="668" y2="342" stroke="#6366f1" stroke-width="1.2" opacity="0.5" marker-end="url(#fm-arrow)"/>
</svg>