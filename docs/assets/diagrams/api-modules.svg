<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="am-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="am-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#am-bg)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">API 模块总览</text>
  <text x="600" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">16 API Modules - Total Endpoints Overview</text>

  <!-- Row 1 -->
  <!-- auth -->
  <rect x="35" y="75" width="260" height="105" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="60" cy="100" r="12" fill="#6366f1" opacity="0.2"/>
  <text x="60" y="105" text-anchor="middle" fill="#6366f1" font-size="14">🔐</text>
  <text x="82" y="104" fill="#6366f1" font-size="14" font-weight="700">auth</text>
  <rect x="230" y="90" width="48" height="20" rx="8" fill="#6366f1" opacity="0.2"/>
  <text x="254" y="104" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">3 API</text>
  <text x="55" y="128" fill="#94a3b8" font-size="10">POST /auth/login</text>
  <text x="55" y="143" fill="#94a3b8" font-size="10">POST /auth/register</text>
  <text x="55" y="158" fill="#94a3b8" font-size="10">POST /auth/refresh</text>

  <!-- chat -->
  <rect x="315" y="75" width="260" height="105" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="340" cy="100" r="12" fill="#22c55e" opacity="0.2"/>
  <text x="340" y="105" text-anchor="middle" fill="#22c55e" font-size="14">💬</text>
  <text x="362" y="104" fill="#22c55e" font-size="14" font-weight="700">chat</text>
  <rect x="510" y="90" width="48" height="20" rx="8" fill="#22c55e" opacity="0.2"/>
  <text x="534" y="104" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">5 API</text>
  <text x="335" y="128" fill="#94a3b8" font-size="10">POST /chat/send (SSE)</text>
  <text x="335" y="143" fill="#94a3b8" font-size="10">GET /conversations</text>
  <text x="335" y="158" fill="#94a3b8" font-size="10">GET|DELETE /conversations/{id}</text>

  <!-- agents -->
  <rect x="595" y="75" width="260" height="105" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="620" cy="100" r="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="620" y="105" text-anchor="middle" fill="#8b5cf6" font-size="14">🤖</text>
  <text x="642" y="104" fill="#8b5cf6" font-size="14" font-weight="700">agents</text>
  <rect x="790" y="90" width="48" height="20" rx="8" fill="#8b5cf6" opacity="0.2"/>
  <text x="814" y="104" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">6 API</text>
  <text x="615" y="128" fill="#94a3b8" font-size="10">CRUD /agents</text>
  <text x="615" y="143" fill="#94a3b8" font-size="10">POST /agents/{id}/duplicate</text>
  <text x="615" y="158" fill="#94a3b8" font-size="10">PATCH /agents/{id}/status</text>

  <!-- mcp -->
  <rect x="875" y="75" width="290" height="105" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="900" cy="100" r="12" fill="#f59e0b" opacity="0.2"/>
  <text x="900" y="105" text-anchor="middle" fill="#f59e0b" font-size="14">🔧</text>
  <text x="922" y="104" fill="#f59e0b" font-size="14" font-weight="700">mcp</text>
  <rect x="1098" y="90" width="48" height="20" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="1122" y="104" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">6 API</text>
  <text x="895" y="128" fill="#94a3b8" font-size="10">CRUD /mcp-connectors</text>
  <text x="895" y="143" fill="#94a3b8" font-size="10">POST /{id}/test</text>
  <text x="895" y="158" fill="#94a3b8" font-size="10">GET /{id}/tools</text>

  <!-- Row 2 -->
  <!-- knowledge -->
  <rect x="35" y="200" width="260" height="105" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="60" cy="225" r="12" fill="#3b82f6" opacity="0.2"/>
  <text x="60" y="230" text-anchor="middle" fill="#3b82f6" font-size="14">📚</text>
  <text x="82" y="229" fill="#3b82f6" font-size="14" font-weight="700">knowledge</text>
  <rect x="230" y="215" width="48" height="20" rx="8" fill="#3b82f6" opacity="0.2"/>
  <text x="254" y="229" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">5 API</text>
  <text x="55" y="253" fill="#94a3b8" font-size="10">CRUD /knowledge-bases</text>
  <text x="55" y="268" fill="#94a3b8" font-size="10">POST /{id}/documents</text>
  <text x="55" y="283" fill="#94a3b8" font-size="10">DELETE /{id}/documents/{docId}</text>

  <!-- plugins -->
  <rect x="315" y="200" width="260" height="105" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="340" cy="225" r="12" fill="#ef4444" opacity="0.2"/>
  <text x="340" y="230" text-anchor="middle" fill="#ef4444" font-size="14">🧩</text>
  <text x="362" y="229" fill="#ef4444" font-size="14" font-weight="700">plugins</text>
  <rect x="510" y="215" width="48" height="20" rx="8" fill="#ef4444" opacity="0.2"/>
  <text x="534" y="229" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">5 API</text>
  <text x="335" y="253" fill="#94a3b8" font-size="10">CRUD /plugins</text>
  <text x="335" y="268" fill="#94a3b8" font-size="10">PATCH /{id}/toggle</text>

  <!-- workflows -->
  <rect x="595" y="200" width="260" height="105" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="620" cy="225" r="12" fill="#22c55e" opacity="0.2"/>
  <text x="620" y="230" text-anchor="middle" fill="#22c55e" font-size="14">⚡</text>
  <text x="642" y="229" fill="#22c55e" font-size="14" font-weight="700">workflows</text>
  <rect x="790" y="215" width="48" height="20" rx="8" fill="#22c55e" opacity="0.2"/>
  <text x="814" y="229" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">4 API</text>
  <text x="615" y="253" fill="#94a3b8" font-size="10">CRUD /workflows</text>
  <text x="615" y="268" fill="#94a3b8" font-size="10">PUT /{id} (含节点/边)</text>

  <!-- system -->
  <rect x="875" y="200" width="290" height="105" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="900" cy="225" r="12" fill="#6366f1" opacity="0.2"/>
  <text x="900" y="230" text-anchor="middle" fill="#6366f1" font-size="14">⚙️</text>
  <text x="922" y="229" fill="#6366f1" font-size="14" font-weight="700">system</text>
  <rect x="1098" y="215" width="48" height="20" rx="8" fill="#6366f1" opacity="0.2"/>
  <text x="1122" y="229" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">5 API</text>
  <text x="895" y="253" fill="#94a3b8" font-size="10">GET|PUT /system/settings</text>
  <text x="895" y="268" fill="#94a3b8" font-size="10">GET /system/health</text>
  <text x="895" y="283" fill="#94a3b8" font-size="10">GET /system/models</text>

  <!-- Row 3 -->
  <!-- billing -->
  <rect x="35" y="325" width="260" height="105" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="60" cy="350" r="12" fill="#f59e0b" opacity="0.2"/>
  <text x="60" y="355" text-anchor="middle" fill="#f59e0b" font-size="14">💰</text>
  <text x="82" y="354" fill="#f59e0b" font-size="14" font-weight="700">billing</text>
  <rect x="230" y="340" width="48" height="20" rx="8" fill="#f59e0b" opacity="0.2"/>
  <text x="254" y="354" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">2 API</text>
  <text x="55" y="378" fill="#94a3b8" font-size="10">GET /billing/usage</text>
  <text x="55" y="393" fill="#94a3b8" font-size="10">GET /billing/plans</text>

  <!-- users -->
  <rect x="315" y="325" width="260" height="105" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="340" cy="350" r="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="340" y="355" text-anchor="middle" fill="#8b5cf6" font-size="14">👥</text>
  <text x="362" y="354" fill="#8b5cf6" font-size="14" font-weight="700">users</text>
  <rect x="510" y="340" width="48" height="20" rx="8" fill="#8b5cf6" opacity="0.2"/>
  <text x="534" y="354" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">4 API</text>
  <text x="335" y="378" fill="#94a3b8" font-size="10">GET /users (admin)</text>
  <text x="335" y="393" fill="#94a3b8" font-size="10">POST /users/invite</text>
  <text x="335" y="408" fill="#94a3b8" font-size="10">PATCH /{id}/role</text>

  <!-- payment -->
  <rect x="595" y="325" width="260" height="105" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="620" cy="350" r="12" fill="#ef4444" opacity="0.2"/>
  <text x="620" y="355" text-anchor="middle" fill="#ef4444" font-size="14">💳</text>
  <text x="642" y="354" fill="#ef4444" font-size="14" font-weight="700">payment</text>
  <rect x="790" y="340" width="48" height="20" rx="8" fill="#ef4444" opacity="0.2"/>
  <text x="814" y="354" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">4 API</text>
  <text x="615" y="378" fill="#94a3b8" font-size="10">POST /payment/create-order</text>
  <text x="615" y="393" fill="#94a3b8" font-size="10">POST /payment/callback</text>
  <text x="615" y="408" fill="#94a3b8" font-size="10">GET /payment/orders</text>

  <!-- channels -->
  <rect x="875" y="325" width="290" height="105" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#am-shadow)"/>
  <circle cx="900" cy="350" r="12" fill="#3b82f6" opacity="0.2"/>
  <text x="900" y="355" text-anchor="middle" fill="#3b82f6" font-size="14">📡</text>
  <text x="922" y="354" fill="#3b82f6" font-size="14" font-weight="700">channels</text>
  <rect x="1098" y="340" width="48" height="20" rx="8" fill="#3b82f6" opacity="0.2"/>
  <text x="1122" y="354" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">1 API</text>
  <text x="895" y="378" fill="#94a3b8" font-size="10">GET /channels/status</text>

  <!-- Row 4 -->
  <!-- audit -->
  <rect x="35" y="450" width="260" height="90" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1" filter="url(#am-shadow)"/>
  <circle cx="60" cy="475" r="12" fill="#94a3b8" opacity="0.2"/>
  <text x="60" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">📋</text>
  <text x="82" y="479" fill="#94a3b8" font-size="13" font-weight="700">audit</text>
  <rect x="230" y="465" width="48" height="20" rx="8" fill="#94a3b8" opacity="0.15"/>
  <text x="254" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">2 API</text>
  <text x="55" y="503" fill="#64748b" font-size="10">GET /audit/logs</text>
  <text x="55" y="518" fill="#64748b" font-size="10">GET /audit/logs/{id}</text>

  <!-- notifications -->
  <rect x="315" y="450" width="260" height="90" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1" filter="url(#am-shadow)"/>
  <circle cx="340" cy="475" r="12" fill="#94a3b8" opacity="0.2"/>
  <text x="340" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">🔔</text>
  <text x="362" y="479" fill="#94a3b8" font-size="13" font-weight="700">notifications</text>
  <rect x="510" y="465" width="48" height="20" rx="8" fill="#94a3b8" opacity="0.15"/>
  <text x="534" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">4 API</text>
  <text x="335" y="503" fill="#64748b" font-size="10">GET /notifications + unread-count</text>
  <text x="335" y="518" fill="#64748b" font-size="10">POST /{id}/read + /read-all</text>

  <!-- search -->
  <rect x="595" y="450" width="260" height="90" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1" filter="url(#am-shadow)"/>
  <circle cx="620" cy="475" r="12" fill="#94a3b8" opacity="0.2"/>
  <text x="620" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">🔍</text>
  <text x="642" y="479" fill="#94a3b8" font-size="13" font-weight="700">search</text>
  <rect x="790" y="465" width="48" height="20" rx="8" fill="#94a3b8" opacity="0.15"/>
  <text x="814" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">1 API</text>
  <text x="615" y="503" fill="#64748b" font-size="10">GET /search?q=keyword</text>

  <!-- apiKeys -->
  <rect x="875" y="450" width="290" height="90" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1" filter="url(#am-shadow)"/>
  <circle cx="900" cy="475" r="12" fill="#94a3b8" opacity="0.2"/>
  <text x="900" y="480" text-anchor="middle" fill="#94a3b8" font-size="14">🔑</text>
  <text x="922" y="479" fill="#94a3b8" font-size="13" font-weight="700">apiKeys</text>
  <rect x="1098" y="465" width="48" height="20" rx="8" fill="#94a3b8" opacity="0.15"/>
  <text x="1122" y="479" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">4 API</text>
  <text x="895" y="503" fill="#64748b" font-size="10">CRUD /api-keys</text>
  <text x="895" y="518" fill="#64748b" font-size="10">POST /{id}/revoke</text>

  <!-- Total count -->
  <text x="600" y="575" text-anchor="middle" fill="#64748b" font-size="11">共 16 个模块，约 61 个 API 端点</text>
</svg>