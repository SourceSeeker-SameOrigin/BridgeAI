<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="rs-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="rs-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="rs-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="rs-arrow" viewBox="0 0 12 8" refX="12" refY="4" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <marker id="rs-arrow-green" viewBox="0 0 12 8" refX="12" refY="4" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1000" height="500" fill="url(#rs-bg)"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">RAG 搜索流程</text>
  <text x="500" y="64" text-anchor="middle" fill="#94a3b8" font-size="14">Retrieval-Augmented Generation Search Pipeline</text>

  <!-- Step 1: Query Input -->
  <g transform="translate(80, 220)">
    <rect x="-65" y="-45" width="130" height="90" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#rs-shadow)"/>
    <text x="0" y="-15" text-anchor="middle" fill="#6366f1" font-size="24">&#128269;</text>
    <text x="0" y="10" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">Query</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="11">用户查询输入</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="220" x2="215" y2="220" stroke="#6366f1" stroke-width="2" marker-end="url(#rs-arrow)"/>
  <text x="182" y="210" text-anchor="middle" fill="#94a3b8" font-size="10">text</text>

  <!-- Step 2: Embed Query -->
  <g transform="translate(290, 220)">
    <rect x="-70" y="-55" width="140" height="110" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#rs-shadow)"/>
    <text x="0" y="-25" text-anchor="middle" fill="#8b5cf6" font-size="20">&#9881;</text>
    <text x="0" y="-2" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">Embed Query</text>
    <line x1="-50" y1="10" x2="50" y2="10" stroke="rgba(148,163,184,0.15)"/>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="10">HashingVectorizer</text>
    <text x="0" y="42" text-anchor="middle" fill="#94a3b8" font-size="10">text → vector</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="365" y1="220" x2="430" y2="220" stroke="#8b5cf6" stroke-width="2" marker-end="url(#rs-arrow)"/>
  <text x="397" y="210" text-anchor="middle" fill="#94a3b8" font-size="10">vector</text>

  <!-- Step 3: pgvector Search -->
  <g transform="translate(530, 220)">
    <rect x="-90" y="-65" width="180" height="130" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#rs-shadow)"/>
    <text x="0" y="-35" text-anchor="middle" fill="#3b82f6" font-size="20">&#128451;</text>
    <text x="0" y="-12" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">pgvector Search</text>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="rgba(148,163,184,0.15)"/>
    <text x="0" y="18" text-anchor="middle" fill="#94a3b8" font-size="10">Cosine Similarity</text>
    <rect x="-72" y="26" width="144" height="26" rx="6" fill="#1e293b"/>
    <text x="0" y="43" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="monospace">ORDER BY embedding &lt;=&gt; q</text>
    <text x="0" y="56" text-anchor="middle" fill="#94a3b8" font-size="10">LIMIT k</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="625" y1="220" x2="700" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#rs-arrow-green)"/>
  <text x="662" y="210" text-anchor="middle" fill="#94a3b8" font-size="10">top-k</text>

  <!-- Step 4: SearchResult -->
  <g transform="translate(810, 220)">
    <rect x="-95" y="-75" width="190" height="150" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#rs-shadow)"/>
    <text x="0" y="-45" text-anchor="middle" fill="#22c55e" font-size="20">&#9989;</text>
    <text x="0" y="-22" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="600">SearchResult[]</text>
    <line x1="-75" y1="-10" x2="75" y2="-10" stroke="rgba(148,163,184,0.15)"/>
    <!-- Fields -->
    <g transform="translate(-70, 6)">
      <rect width="140" height="22" rx="4" fill="#1e293b"/>
      <text x="8" y="15" fill="#22c55e" font-size="10" font-family="monospace">content</text>
      <text x="132" y="15" text-anchor="end" fill="#94a3b8" font-size="10">str</text>
    </g>
    <g transform="translate(-70, 32)">
      <rect width="140" height="22" rx="4" fill="#1e293b"/>
      <text x="8" y="15" fill="#22c55e" font-size="10" font-family="monospace">similarity</text>
      <text x="132" y="15" text-anchor="end" fill="#94a3b8" font-size="10">float</text>
    </g>
    <g transform="translate(-70, 58)">
      <rect width="140" height="22" rx="4" fill="#1e293b"/>
      <text x="8" y="15" fill="#22c55e" font-size="10" font-family="monospace">chunk_id</text>
      <text x="132" y="15" text-anchor="end" fill="#94a3b8" font-size="10">str</text>
    </g>
  </g>

  <!-- Bottom: pipeline description -->
  <g transform="translate(500, 430)">
    <rect x="-350" y="-20" width="700" height="40" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" fill="#94a3b8" font-size="12">Pipeline: Query Text &#8594; HashingVectorizer &#8594; pgvector cosine distance &#8594; Top-K SearchResult with similarity scores</text>
  </g>

  <!-- Step number badges -->
  <circle cx="32" cy="178" r="14" fill="#6366f1" filter="url(#rs-glow)"/>
  <text x="32" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">1</text>
  <circle cx="237" cy="178" r="14" fill="#8b5cf6"/>
  <text x="237" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
  <circle cx="457" cy="178" r="14" fill="#3b82f6"/>
  <text x="457" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">3</text>
  <circle cx="732" cy="178" r="14" fill="#22c55e"/>
  <text x="732" y="183" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">4</text>
</svg>