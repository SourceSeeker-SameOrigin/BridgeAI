<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="1000" height="550">
  <defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/></filter></defs>
  <rect width="1000" height="550" fill="#0a0e1a"/>
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">安全架构</text>
  <rect x="30" y="55" width="450" height="220" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="55" width="450" height="32" rx="12" fill="#22c55e" opacity="0.2"/>
  <text x="255" y="76" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="14" font-weight="700">认证与授权</text>
  <rect x="50" y="95" width="190" height="75" rx="8" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="145" y="115" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="12" font-weight="600">JWT Token</text>
  <text x="60" y="135" fill="#94a3b8" font-family="system-ui" font-size="10">Access Token: 24h</text>
  <text x="60" y="152" fill="#94a3b8" font-family="system-ui" font-size="10">HS256签名, user/tenant/role</text>
  <rect x="260" y="95" width="200" height="75" rx="8" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="360" y="115" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="12" font-weight="600">API Key</text>
  <text x="270" y="135" fill="#94a3b8" font-family="system-ui" font-size="10">Hash存储(不存明文)</text>
  <text x="270" y="152" fill="#94a3b8" font-family="system-ui" font-size="10">权限范围scopes+过期时间</text>
  <text x="50" y="195" fill="#6366f1" font-family="system-ui" font-size="12" font-weight="600">RBAC权限:</text>
  <text x="60" y="215" fill="#22c55e" font-family="system-ui" font-size="10">admin 全部权限</text>
  <text x="200" y="215" fill="#3b82f6" font-family="system-ui" font-size="10">user 使用+管理自己资源</text>
  <text x="60" y="235" fill="#94a3b8" font-family="system-ui" font-size="10">viewer 只读对话</text>
  <text x="60" y="260" fill="#64748b" font-family="system-ui" font-size="9">OAuth: 企微/钉钉/飞书渠道登录</text>
  <rect x="520" y="55" width="450" height="220" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="55" width="450" height="32" rx="12" fill="#ef4444" opacity="0.2"/>
  <text x="745" y="76" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="14" font-weight="700">数据安全</text>
  <text x="540" y="105" fill="#f1f5f9" font-family="system-ui" font-size="12" font-weight="600">存储层加密</text>
  <text x="550" y="125" fill="#94a3b8" font-family="system-ui" font-size="10">密码: bcrypt(rounds=12)</text>
  <text x="550" y="142" fill="#94a3b8" font-family="system-ui" font-size="10">API Key: SHA256 hash</text>
  <text x="550" y="159" fill="#94a3b8" font-family="system-ui" font-size="10">MCP凭据: AES-256加密</text>
  <text x="540" y="185" fill="#f1f5f9" font-family="system-ui" font-size="12" font-weight="600">传输层: HTTPS (TLS 1.3) + HSTS</text>
  <text x="540" y="215" fill="#f1f5f9" font-family="system-ui" font-size="12" font-weight="600">MCP输出脱敏</text>
  <text x="550" y="235" fill="#94a3b8" font-family="system-ui" font-size="10">手机号/身份证/银行卡/邮箱 → 自动替换</text>
  <text x="550" y="260" fill="#64748b" font-family="system-ui" font-size="9">正则匹配 + 星号替换</text>
  <rect x="30" y="295" width="450" height="230" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="295" width="450" height="32" rx="12" fill="#3b82f6" opacity="0.2"/>
  <text x="255" y="316" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="14" font-weight="700">HTTP安全头 + 防御</text>
  <text x="50" y="346" fill="#f1f5f9" font-family="system-ui" font-size="10">X-Content-Type-Options: nosniff</text>
  <text x="50" y="363" fill="#f1f5f9" font-family="system-ui" font-size="10">X-Frame-Options: DENY</text>
  <text x="50" y="380" fill="#f1f5f9" font-family="system-ui" font-size="10">X-XSS-Protection: 1; mode=block</text>
  <text x="50" y="397" fill="#f1f5f9" font-family="system-ui" font-size="10">Strict-Transport-Security: max-age=31536000</text>
  <text x="50" y="414" fill="#f1f5f9" font-family="system-ui" font-size="10">Content-Security-Policy: default-src self</text>
  <text x="50" y="431" fill="#f1f5f9" font-family="system-ui" font-size="10">Referrer-Policy: strict-origin-when-cross-origin</text>
  <text x="50" y="455" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">防御:</text>
  <text x="100" y="455" fill="#64748b" font-family="system-ui" font-size="10">SQL注入(ORM参数化) | XSS(React+CSP) | CSRF(SameSite)</text>
  <text x="50" y="475" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">限流:</text>
  <text x="100" y="475" fill="#64748b" font-family="system-ui" font-size="10">Redis令牌桶 按API Key/IP限流</text>
  <text x="50" y="495" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">过滤:</text>
  <text x="100" y="495" fill="#64748b" font-family="system-ui" font-size="10">DFA敏感词过滤 ContentFilterMiddleware</text>
  <rect x="520" y="295" width="450" height="230" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="295" width="450" height="32" rx="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="745" y="316" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="14" font-weight="700">多租户隔离 (4维)</text>
  <text x="540" y="350" fill="#f1f5f9" font-family="system-ui" font-size="11" font-weight="600">TenantMiddleware</text>
  <text x="550" y="370" fill="#94a3b8" font-family="system-ui" font-size="10">提取X-Tenant-Id | JWT tenant优先</text>
  <text x="550" y="390" fill="#94a3b8" font-family="system-ui" font-size="10">asyncio Task-local传播到所有操作</text>
  <text x="540" y="420" fill="#f1f5f9" font-family="system-ui" font-size="11" font-weight="600">ORM自动过滤</text>
  <text x="550" y="440" fill="#94a3b8" font-family="system-ui" font-size="10">SQLAlchemy事件监听 自动注入WHERE</text>
  <text x="540" y="470" fill="#f1f5f9" font-family="system-ui" font-size="11" font-weight="600">4维隔离:</text>
  <rect x="550" y="478" width="75" height="20" rx="5" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="587" y="492" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="9">Tenant</text>
  <rect x="635" y="478" width="60" height="20" rx="5" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="492" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="9">User</text>
  <rect x="705" y="478" width="60" height="20" rx="5" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="492" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="9">Agent</text>
  <rect x="775" y="478" width="70" height="20" rx="5" fill="#0a0e1a" stroke="#ec4899" stroke-width="1"/>
  <text x="810" y="492" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="9">Session</text>
  <text x="550" y="515" fill="#64748b" font-family="system-ui" font-size="9">共享数据库行级隔离 + Redis key命名隔离</text>
</svg>
