<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <marker id="ca-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="ca-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="1100" height="500" fill="url(#ca-bg)"/>
  <text x="550" y="40" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">多渠道接入架构</text>
  <text x="550" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">Unified Channel Integration Layer</text>

  <!-- 3 Channels (left) -->
  <!-- WeChat Work -->
  <rect x="40" y="100" width="220" height="100" rx="12" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="150" y="135" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">企业微信</text>
  <text x="150" y="158" fill="#94a3b8" font-size="11" text-anchor="middle">WeChat Work</text>
  <rect x="65" y="168" width="170" height="22" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="150" y="183" fill="#22c55e" font-size="9" text-anchor="middle" font-family="monospace">/webhook/wechat-work</text>

  <!-- DingTalk -->
  <rect x="40" y="220" width="220" height="100" rx="12" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="150" y="255" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">钉钉</text>
  <text x="150" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">DingTalk</text>
  <rect x="65" y="288" width="170" height="22" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="150" y="303" fill="#3b82f6" font-size="9" text-anchor="middle" font-family="monospace">/webhook/dingtalk</text>

  <!-- Feishu -->
  <rect x="40" y="340" width="220" height="100" rx="12" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="150" y="375" fill="#8b5cf6" font-size="15" font-weight="700" text-anchor="middle">飞书</text>
  <text x="150" y="398" fill="#94a3b8" font-size="11" text-anchor="middle">Feishu / Lark</text>
  <rect x="65" y="408" width="170" height="22" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="150" y="423" fill="#8b5cf6" font-size="9" text-anchor="middle" font-family="monospace">/webhook/feishu</text>

  <!-- ChannelManager -->
  <rect x="360" y="140" width="220" height="260" rx="16" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.5" stroke-width="2"/>
  <text x="470" y="175" fill="#6366f1" font-size="17" font-weight="700" text-anchor="middle">ChannelManager</text>
  <rect x="385" y="195" width="170" height="35" rx="6" fill="#111827" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="470" y="217" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="600">parse_message()</text>
  <rect x="385" y="245" width="170" height="35" rx="6" fill="#111827" stroke="#3b82f6" stroke-opacity="0.3"/>
  <text x="470" y="267" fill="#3b82f6" font-size="11" text-anchor="middle" font-weight="600">format_response()</text>
  <rect x="385" y="295" width="170" height="35" rx="6" fill="#111827" stroke="#f59e0b" stroke-opacity="0.3"/>
  <text x="470" y="317" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">send_reply()</text>
  <rect x="385" y="345" width="170" height="35" rx="6" fill="#111827" stroke="#8b5cf6" stroke-opacity="0.3"/>
  <text x="470" y="367" fill="#8b5cf6" font-size="11" text-anchor="middle" font-weight="600">verify_signature()</text>

  <!-- Arrows: Channels -> ChannelManager -->
  <line x1="260" y1="150" x2="350" y2="210" stroke="#22c55e" stroke-width="2" marker-end="url(#ca-arr)"/>
  <line x1="260" y1="270" x2="350" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#ca-arr)"/>
  <line x1="260" y1="390" x2="350" y2="330" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ca-arr)"/>

  <!-- ChatService -->
  <rect x="680" y="180" width="200" height="180" rx="16" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="780" y="215" fill="#f59e0b" font-size="16" font-weight="700" text-anchor="middle">ChatService</text>
  <text x="780" y="245" fill="#94a3b8" font-size="11" text-anchor="middle">AI 对话处理</text>
  <text x="780" y="268" fill="#94a3b8" font-size="11" text-anchor="middle">Agent 路由</text>
  <text x="780" y="291" fill="#94a3b8" font-size="11" text-anchor="middle">工具调用</text>
  <text x="780" y="314" fill="#94a3b8" font-size="11" text-anchor="middle">记忆管理</text>
  <text x="780" y="337" fill="#94a3b8" font-size="11" text-anchor="middle">流式响应</text>

  <!-- ChannelManager -> ChatService -->
  <line x1="580" y1="250" x2="670" y2="250" stroke="#6366f1" stroke-width="2" marker-end="url(#ca-arr)"/>
  <text x="625" y="240" fill="#6366f1" font-size="10" text-anchor="middle">request</text>

  <!-- ChatService -> ChannelManager (response) -->
  <line x1="670" y1="290" x2="580" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#ca-arr-g)" stroke-dasharray="5,3"/>
  <text x="625" y="308" fill="#22c55e" font-size="10" text-anchor="middle">response</text>

  <!-- Reply arrows back to channels -->
  <line x1="350" y1="230" x2="260" y2="170" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="350" y1="290" x2="260" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="350" y1="350" x2="260" y2="410" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Legend -->
  <rect x="930" y="130" width="140" height="80" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="1000" y="152" fill="#94a3b8" font-size="11" font-weight="600" text-anchor="middle">Flow</text>
  <line x1="945" y1="168" x2="975" y2="168" stroke="#6366f1" stroke-width="2"/>
  <text x="985" y="172" fill="#94a3b8" font-size="10" text-anchor="start">Request</text>
  <line x1="945" y1="188" x2="975" y2="188" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="985" y="192" fill="#94a3b8" font-size="10" text-anchor="start">Reply</text>
</svg>