<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ef4444"/></marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/></filter>
  </defs>
  <rect width="1000" height="500" fill="#0a0e1a"/>
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">认证流程 - Auth Flow</text>

  <!-- Start: App Init -->
  <rect x="50" y="80" width="140" height="44" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <text x="120" y="106" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">App 初始化</text>

  <!-- Arrow to check localStorage -->
  <line x1="190" y1="102" x2="240" y2="102" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Check localStorage -->
  <polygon points="340,72 410,102 340,132 270,102" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="99" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="10" font-weight="600">localStorage</text>
  <text x="340" y="112" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="10" font-weight="600">token?</text>

  <!-- No token -> Login Page -->
  <line x1="340" y1="132" x2="340" y2="200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="350" y="165" fill="#ef4444" font-family="system-ui" font-size="10">无 Token</text>

  <rect x="270" y="200" width="140" height="44" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="226" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="13" font-weight="600">Login 页面</text>

  <!-- Has token -> GET /me -->
  <line x1="410" y1="102" x2="500" y2="102" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="455" y="92" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">有 Token</text>

  <rect x="500" y="80" width="140" height="44" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="100" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12" font-weight="600">GET /auth/me</text>
  <text x="570" y="115" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">验证 Token</text>

  <!-- Valid -> Dashboard -->
  <line x1="640" y1="102" x2="730" y2="102" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="685" y="92" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">Valid</text>

  <rect x="730" y="80" width="140" height="44" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="106" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="14" font-weight="700">Dashboard</text>

  <!-- Invalid -> Login -->
  <line x1="570" y1="124" x2="570" y2="180" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="570" y1="180" x2="410" y2="222" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="540" y="155" fill="#ef4444" font-family="system-ui" font-size="10">401 Invalid</text>

  <!-- Login -> POST /login -->
  <line x1="340" y1="244" x2="340" y2="290" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="370" y="270" fill="#94a3b8" font-family="system-ui" font-size="10">提交凭证</text>

  <rect x="270" y="290" width="140" height="44" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="310" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12" font-weight="600">POST /auth/login</text>
  <text x="340" y="325" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">username + password</text>

  <!-- Success -> Store token -->
  <line x1="410" y1="312" x2="500" y2="312" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="455" y="302" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">200 OK</text>

  <rect x="500" y="290" width="160" height="44" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="580" y="310" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="12" font-weight="600">Store Token</text>
  <text x="580" y="325" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">localStorage.set()</text>

  <!-- Store -> Dashboard -->
  <line x1="660" y1="312" x2="780" y2="312" stroke="#22c55e" stroke-width="2"/>
  <line x1="800" y1="312" x2="800" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- 401 Interceptor -->
  <rect x="600" y="390" width="280" height="90" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="415" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="600">Axios 401 拦截器</text>
  <text x="740" y="438" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">任何 API 返回 401 时:</text>
  <text x="740" y="458" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">清除 Token → 重定向 /login</text>

  <!-- Arrow from interceptor to login -->
  <line x1="600" y1="435" x2="410" y2="230" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowO)"/>

  <!-- Arrow from Dashboard to interceptor -->
  <line x1="870" y1="120" x2="920" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="920" y1="120" x2="920" y2="435" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="920" y1="435" x2="880" y2="435" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="940" y="280" fill="#64748b" font-family="system-ui" font-size="9" transform="rotate(90,940,280)">API 请求</text>

  <!-- Legend -->
  <rect x="50" y="380" width="400" height="100" rx="12" fill="#111827" opacity="0.4"/>
  <text x="80" y="405" fill="#94a3b8" font-family="system-ui" font-size="12" font-weight="600">认证状态流转</text>
  <line x1="80" y1="425" x2="120" y2="425" stroke="#22c55e" stroke-width="2"/><text x="130" y="429" fill="#94a3b8" font-family="system-ui" font-size="10">认证成功</text>
  <line x1="230" y1="425" x2="270" y2="425" stroke="#ef4444" stroke-width="2"/><text x="280" y="429" fill="#94a3b8" font-family="system-ui" font-size="10">认证失败/过期</text>
  <line x1="80" y1="455" x2="120" y2="455" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/><text x="130" y="459" fill="#94a3b8" font-family="system-ui" font-size="10">401 自动拦截</text>
  <line x1="280" y1="455" x2="320" y2="455" stroke="#3b82f6" stroke-width="2"/><text x="330" y="459" fill="#94a3b8" font-family="system-ui" font-size="10">API 调用</text>
</svg>
