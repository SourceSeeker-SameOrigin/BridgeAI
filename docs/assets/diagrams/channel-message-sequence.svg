<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="cms-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="cms-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="cms-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="cms-arrow-back" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#cms-bg)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">渠道消息时序图</text>
  <text x="600" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Channel Message Sequence Diagram</text>

  <!-- Participants -->
  <!-- IM Platform -->
  <g transform="translate(100, 90)">
    <rect x="-55" y="-18" width="110" height="36" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#cms-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">IM Platform</text>
  </g>
  <line x1="100" y1="108" x2="100" y2="540" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- channels.py -->
  <g transform="translate(310, 90)">
    <rect x="-55" y="-18" width="110" height="36" rx="10" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#cms-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="600">channels.py</text>
  </g>
  <line x1="310" y1="108" x2="310" y2="540" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- ChannelManager -->
  <g transform="translate(530, 90)">
    <rect x="-70" y="-18" width="140" height="36" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#cms-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="600">ChannelManager</text>
  </g>
  <line x1="530" y1="108" x2="530" y2="540" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- ChatService -->
  <g transform="translate(770, 90)">
    <rect x="-65" y="-18" width="130" height="36" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#cms-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">ChatService</text>
  </g>
  <line x1="770" y1="108" x2="770" y2="540" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- LLM Provider -->
  <g transform="translate(1020, 90)">
    <rect x="-60" y="-18" width="120" height="36" rx="10" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#cms-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">LLM Provider</text>
  </g>
  <line x1="1020" y1="108" x2="1020" y2="540" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Message 1: Webhook POST -->
  <line x1="105" y1="155" x2="305" y2="155" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#cms-arrow)"/>
  <rect x="140" y="138" width="130" height="22" rx="4" fill="#1e293b"/>
  <text x="205" y="153" text-anchor="middle" fill="#f59e0b" font-size="11">Webhook POST</text>

  <!-- Activation box on channels.py -->
  <rect x="305" y="155" width="10" height="45" rx="2" fill="#6366f1" opacity="0.4"/>

  <!-- Message 2: route_message_to_chat -->
  <line x1="315" y1="195" x2="525" y2="195" stroke="#6366f1" stroke-width="1.5" marker-end="url(#cms-arrow)"/>
  <rect x="335" y="178" width="170" height="22" rx="4" fill="#1e293b"/>
  <text x="420" y="193" text-anchor="middle" fill="#6366f1" font-size="11">route_message_to_chat()</text>

  <!-- Activation box on ChannelManager -->
  <rect x="525" y="195" width="10" height="55" rx="2" fill="#8b5cf6" opacity="0.4"/>

  <!-- Message 3: build ChatRequest -->
  <rect x="540" y="218" width="10" height="25" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <line x1="540" y1="230" x2="560" y2="230" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="580" y="234" fill="#94a3b8" font-size="10">build ChatRequest</text>

  <!-- Message 4: process_chat_sync -->
  <line x1="535" y1="270" x2="765" y2="270" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#cms-arrow)"/>
  <rect x="575" y="253" width="150" height="22" rx="4" fill="#1e293b"/>
  <text x="650" y="268" text-anchor="middle" fill="#8b5cf6" font-size="11">process_chat_sync(req)</text>

  <!-- Activation box on ChatService -->
  <rect x="765" y="270" width="10" height="80" rx="2" fill="#3b82f6" opacity="0.4"/>

  <!-- Message 5: call LLM -->
  <line x1="775" y1="310" x2="1015" y2="310" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#cms-arrow)"/>
  <rect x="845" y="293" width="120" height="22" rx="4" fill="#1e293b"/>
  <text x="905" y="308" text-anchor="middle" fill="#3b82f6" font-size="11">generate(prompt)</text>

  <!-- Message 6: LLM response -->
  <line x1="1015" y1="345" x2="775" y2="345" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#cms-arrow-back)"/>
  <rect x="845" y="328" width="120" height="22" rx="4" fill="#1e293b"/>
  <text x="905" y="343" text-anchor="middle" fill="#22c55e" font-size="11">AI response</text>

  <!-- Message 7: return response -->
  <line x1="765" y1="385" x2="535" y2="385" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#cms-arrow-back)"/>
  <rect x="590" y="368" width="130" height="22" rx="4" fill="#1e293b"/>
  <text x="655" y="383" text-anchor="middle" fill="#22c55e" font-size="11">ChatResponse</text>

  <!-- Message 8: send_reply -->
  <line x1="525" y1="425" x2="315" y2="425" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#cms-arrow-back)"/>
  <rect x="360" y="408" width="120" height="22" rx="4" fill="#1e293b"/>
  <text x="420" y="423" text-anchor="middle" fill="#8b5cf6" font-size="11">send_reply(msg)</text>

  <!-- Message 9: Reply to IM -->
  <line x1="305" y1="465" x2="105" y2="465" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#cms-arrow-back)"/>
  <rect x="145" y="448" width="120" height="22" rx="4" fill="#1e293b"/>
  <text x="205" y="463" text-anchor="middle" fill="#22c55e" font-size="11">Reply Message</text>

  <!-- Step numbers -->
  <circle cx="55" cy="155" r="11" fill="#f59e0b"/>
  <text x="55" y="159" text-anchor="middle" fill="#0a0e1a" font-size="10" font-weight="700">1</text>
  <circle cx="55" cy="195" r="11" fill="#6366f1"/>
  <text x="55" y="199" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
  <circle cx="55" cy="270" r="11" fill="#8b5cf6"/>
  <text x="55" y="274" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
  <circle cx="55" cy="310" r="11" fill="#3b82f6"/>
  <text x="55" y="314" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
  <circle cx="55" cy="345" r="11" fill="#22c55e"/>
  <text x="55" y="349" text-anchor="middle" fill="#0a0e1a" font-size="10" font-weight="700">5</text>
  <circle cx="55" cy="425" r="11" fill="#8b5cf6"/>
  <text x="55" y="429" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">6</text>
  <circle cx="55" cy="465" r="11" fill="#f59e0b"/>
  <text x="55" y="469" text-anchor="middle" fill="#0a0e1a" font-size="10" font-weight="700">7</text>

  <!-- Bottom participants -->
  <g transform="translate(100, 555)">
    <rect x="-55" y="-12" width="110" height="24" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#f59e0b" font-size="10">IM Platform</text>
  </g>
  <g transform="translate(310, 555)">
    <rect x="-55" y="-12" width="110" height="24" rx="8" fill="#111827" stroke="#6366f1" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#6366f1" font-size="10">channels.py</text>
  </g>
  <g transform="translate(530, 555)">
    <rect x="-70" y="-12" width="140" height="24" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#8b5cf6" font-size="10">ChannelManager</text>
  </g>
  <g transform="translate(770, 555)">
    <rect x="-65" y="-12" width="130" height="24" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#3b82f6" font-size="10">ChatService</text>
  </g>
  <g transform="translate(1020, 555)">
    <rect x="-60" y="-12" width="120" height="24" rx="8" fill="#111827" stroke="#22c55e" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#22c55e" font-size="10">LLM Provider</text>
  </g>
</svg>