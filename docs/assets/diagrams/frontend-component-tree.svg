<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="fc-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="url(#fc-bg)"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">前端组件树</text>
  <text x="700" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Frontend Component Tree - React Application Structure</text>

  <!-- App root -->
  <rect x="620" y="75" width="160" height="38" rx="12" fill="#6366f1" filter="url(#fc-shadow)"/>
  <text x="700" y="100" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">App</text>

  <!-- Lines from App -->
  <line x1="660" y1="113" x2="130" y2="145" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="113" x2="330" y2="145" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="700" y1="113" x2="530" y2="145" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="740" y1="113" x2="900" y2="145" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>

  <!-- Public routes (green) -->
  <rect x="60" y="148" width="140" height="34" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="130" y="170" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Landing</text>
  <rect x="125" y="168" width="8" height="8" rx="4" fill="#22c55e" opacity="0.5"/>

  <rect x="260" y="148" width="140" height="34" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="330" y="170" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Login</text>

  <rect x="460" y="148" width="140" height="34" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="530" y="170" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Docs</text>

  <!-- AuthGuard -->
  <rect x="810" y="148" width="180" height="34" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#fc-shadow)"/>
  <text x="900" y="170" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="700">AuthGuard</text>

  <!-- Line from AuthGuard to AppLayout -->
  <line x1="900" y1="182" x2="900" y2="210" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>

  <!-- AppLayout -->
  <rect x="790" y="213" width="220" height="34" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="900" y="235" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="600">AppLayout</text>

  <!-- Lines from AppLayout -->
  <line x1="830" y1="247" x2="160" y2="282" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <line x1="860" y1="247" x2="400" y2="282" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <line x1="940" y1="247" x2="700" y2="282" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>

  <!-- Sidebar -->
  <rect x="80" y="285" width="160" height="34" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="160" y="307" text-anchor="middle" fill="#f1f5f9" font-size="13">Sidebar</text>

  <!-- TopBar -->
  <rect x="320" y="285" width="160" height="34" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="400" y="307" text-anchor="middle" fill="#f1f5f9" font-size="13">TopBar</text>

  <!-- Pages -->
  <rect x="580" y="285" width="240" height="34" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="700" y="307" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="600">Pages</text>

  <!-- Lines from Pages to each page -->
  <line x1="610" y1="319" x2="85" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="640" y1="319" x2="240" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="660" y1="319" x2="410" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="680" y1="319" x2="570" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="700" y1="319" x2="730" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="319" x2="870" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="740" y1="319" x2="1010" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="760" y1="319" x2="1150" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="780" y1="319" x2="1290" y2="365" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>

  <!-- Page nodes row -->
  <!-- Dashboard -->
  <rect x="25" y="368" width="120" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="85" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">Dashboard</text>

  <!-- Chat (complex) -->
  <rect x="170" y="368" width="140" height="30" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="240" y="388" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Chat</text>

  <!-- Agents -->
  <rect x="340" y="368" width="140" height="30" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="410" y="388" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Agents</text>

  <!-- MCP -->
  <rect x="510" y="368" width="120" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="570" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">MCP</text>

