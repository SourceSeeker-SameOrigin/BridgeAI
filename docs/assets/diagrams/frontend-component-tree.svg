  <rect x="660" y="368" width="130" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="725" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">Knowledge</text>

  <!-- Plugins -->
  <rect x="810" y="368" width="120" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="870" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">Plugins</text>

  <!-- Workflows (complex) -->
  <rect x="950" y="368" width="140" height="30" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#fc-shadow)"/>
  <text x="1020" y="388" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Workflows</text>

  <!-- AuditLog -->
  <rect x="1110" y="368" width="120" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="1170" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">AuditLog</text>

  <!-- Settings -->
  <rect x="1250" y="368" width="120" height="30" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#fc-shadow)"/>
  <text x="1310" y="388" text-anchor="middle" fill="#f1f5f9" font-size="11">Settings</text>

  <!-- Chat sub-components -->
  <line x1="200" y1="398" x2="200" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="230" y1="398" x2="230" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="260" y1="398" x2="260" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="290" y1="398" x2="290" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>

  <g transform="translate(50, 428)">
    <rect width="680" height="145" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" filter="url(#fc-shadow)"/>
    <text x="340" y="20" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" opacity="0.7">Chat Sub-Components</text>
    <rect x="15" y="32" width="140" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="85" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">SessionList</text>
    <rect x="170" y="32" width="150" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="245" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">MessageArea</text>
    <rect x="335" y="32" width="140" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="405" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">InputBar</text>
    <rect x="490" y="32" width="170" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="575" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">ContextPanel</text>

    <!-- MessageArea sub -->
    <line x1="245" y1="60" x2="245" y2="75" stroke="#94a3b8" stroke-width="0.6" opacity="0.3"/>
    <rect x="145" y="78" width="200" height="52" rx="8" fill="#6366f1" opacity="0.05" stroke="#6366f1" stroke-width="0.6"/>
    <text x="245" y="97" text-anchor="middle" fill="#94a3b8" font-size="10">MessageBubble, ToolCallCard,</text>
    <text x="245" y="112" text-anchor="middle" fill="#94a3b8" font-size="10">CodeBlock, MarkdownRenderer</text>
  </g>

  <!-- Agents sub -->
  <line x1="410" y1="398" x2="410" y2="440" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <rect x="365" y="443" width="130" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="430" y="462" text-anchor="middle" fill="#f1f5f9" font-size="11">AgentEditor</text>

  <!-- Workflows sub-components -->
  <line x1="980" y1="398" x2="980" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="1020" y1="398" x2="1020" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <line x1="1060" y1="398" x2="1060" y2="425" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>

  <g transform="translate(880, 428)">
    <rect width="390" height="80" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" filter="url(#fc-shadow)"/>
    <text x="195" y="20" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600" opacity="0.7">Workflows Sub-Components</text>
    <rect x="15" y="32" width="110" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="70" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">NodePalette</text>
    <rect x="140" y="32" width="100" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="190" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">FlowNode</text>
    <rect x="255" y="32" width="120" height="28" rx="8" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="315" y="51" text-anchor="middle" fill="#f1f5f9" font-size="11">NodeConfigPanel</text>
  </g>

  <!-- Settings sub -->
  <line x1="1310" y1="398" x2="1310" y2="440" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <rect x="1255" y="443" width="120" height="28" rx="8" fill="rgba(148,163,184,0.05)" stroke="rgba(148,163,184,0.15)" stroke-width="0.8"/>
  <text x="1315" y="462" text-anchor="middle" fill="#94a3b8" font-size="10">6 Tabs</text>

  <!-- Legend -->
  <g transform="translate(30, 735)">
    <rect width="400" height="40" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
    <rect x="15" y="12" width="30" height="16" rx="6" fill="none" stroke="#22c55e" stroke-width="1.2"/>
    <text x="55" y="24" fill="#94a3b8" font-size="11">Public</text>
    <rect x="110" y="12" width="30" height="16" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="150" y="24" fill="#94a3b8" font-size="11">Protected (Complex)</text>
    <rect x="270" y="12" width="30" height="16" rx="6" fill="none" stroke="rgba(148,163,184,0.15)" stroke-width="1.2"/>
    <text x="310" y="24" fill="#94a3b8" font-size="11">Simple Page</text>
  </g>
</svg>