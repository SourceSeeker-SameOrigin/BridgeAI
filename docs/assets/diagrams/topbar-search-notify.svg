<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tsn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="tsn-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="tsn-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="tsn-arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1000" height="400" fill="url(#tsn-bg)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">顶栏搜索 &amp; 通知</text>
  <text x="500" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">TopBar - Global Search &amp; Notification System</text>

  <!-- Divider -->
  <line x1="490" y1="70" x2="490" y2="380" stroke="rgba(148,163,184,0.15)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Global Search -->
  <text x="245" y="80" text-anchor="middle" fill="#6366f1" font-size="15" font-weight="700">全局搜索</text>

  <!-- Input -->
  <rect x="55" y="100" width="180" height="36" rx="10" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#tsn-shadow)"/>
  <text x="80" y="123" fill="#94a3b8" font-size="11">🔍 搜索智能体、知识库...</text>

  <line x1="235" y1="118" x2="265" y2="118" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tsn-arrow)"/>

  <!-- debounce -->
  <rect x="268" y="100" width="120" height="36" rx="10" fill="#0a0e1a" stroke="#8b5cf6" stroke-width="1" filter="url(#tsn-shadow)"/>
  <text x="328" y="118" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">debounce</text>
  <text x="328" y="132" text-anchor="middle" fill="#64748b" font-size="9">300ms</text>

  <line x1="388" y1="118" x2="418" y2="118" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tsn-arrow)"/>

  <!-- API call -->
  <rect x="55" y="160" width="160" height="36" rx="10" fill="#111827" stroke="#22c55e" stroke-width="1" filter="url(#tsn-shadow)"/>
  <text x="135" y="178" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">GET /search?q=...</text>
  <text x="135" y="192" text-anchor="middle" fill="#64748b" font-size="9">全局搜索 API</text>

  <!-- Arrow down from debounce to API -->
  <line x1="328" y1="136" x2="215" y2="158" stroke="#6366f1" stroke-width="1" opacity="0.5" marker-end="url(#tsn-arrow)"/>

  <line x1="215" y1="178" x2="255" y2="178" stroke="#22c55e" stroke-width="1.5" marker-end="url(#tsn-arrow)"/>

  <!-- Dropdown results -->
  <rect x="258" y="155" width="200" height="90" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#tsn-shadow)"/>
  <text x="278" y="175" fill="#f1f5f9" font-size="11" font-weight="600">搜索结果下拉</text>
  <line x1="278" y1="182" x2="438" y2="182" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <circle cx="285" cy="197" r="4" fill="#8b5cf6"/>
  <text x="296" y="201" fill="#94a3b8" font-size="10">智能体: GPT-4 Agent</text>
  <circle cx="285" cy="215" r="4" fill="#3b82f6"/>
  <text x="296" y="219" fill="#94a3b8" font-size="10">知识库: 产品文档</text>
  <circle cx="285" cy="233" r="4" fill="#22c55e"/>
  <text x="296" y="237" fill="#94a3b8" font-size="10">会话: 昨日对话...</text>

  <!-- Click navigate -->
  <line x1="358" y1="245" x2="358" y2="275" stroke="#6366f1" stroke-width="1.5" marker-end="url(#tsn-arrow)"/>
  <rect x="288" y="278" width="140" height="30" rx="8" fill="#6366f1" filter="url(#tsn-shadow)"/>
  <text x="358" y="298" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">navigate(path)</text>
  <text x="358" y="328" text-anchor="middle" fill="#64748b" font-size="9">跳转到对应详情页</text>

  <!-- RIGHT: Notifications -->
  <text x="740" y="80" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700">通知系统</text>

  <!-- Poll -->
  <rect x="530" y="100" width="130" height="36" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#tsn-shadow)"/>
  <text x="595" y="118" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">poll(30s)</text>
  <text x="595" y="132" text-anchor="middle" fill="#64748b" font-size="9">轮询定时器</text>

  <line x1="660" y1="118" x2="690" y2="118" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#tsn-arrow-orange)"/>

  <!-- API -->
  <rect x="693" y="100" width="170" height="36" rx="10" fill="#111827" stroke="#22c55e" stroke-width="1" filter="url(#tsn-shadow)"/>
  <text x="778" y="116" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">GET /notifications</text>
  <text x="778" y="130" text-anchor="middle" fill="#22c55e" font-size="9">/unread-count</text>

  <line x1="778" y1="136" x2="778" y2="162" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#tsn-arrow-orange)"/>

  <!-- Badge -->
  <rect x="700" y="165" width="160" height="40" rx="10" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#tsn-shadow)"/>
  <text x="760" y="185" text-anchor="middle" fill="#f1f5f9" font-size="12">🔔</text>
  <circle cx="773" cy="177" r="9" fill="#ef4444"/>
  <text x="773" y="181" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">5</text>
  <text x="810" y="192" fill="#94a3b8" font-size="10">Badge</text>

  <!-- Click bell -->
  <line x1="780" y1="205" x2="780" y2="230" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#tsn-arrow-orange)"/>
  <text x="820" y="223" fill="#64748b" font-size="9">click bell</text>

  <!-- Drawer -->
  <rect x="680" y="233" width="280" height="130" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="1" filter="url(#tsn-shadow)"/>
  <text x="700" y="255" fill="#f59e0b" font-size="12" font-weight="600">通知抽屉 (Drawer)</text>
  <line x1="700" y1="262" x2="940" y2="262" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>

  <rect x="700" y="270" width="240" height="26" rx="6" fill="#0a0e1a" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <circle cx="715" cy="283" r="4" fill="#3b82f6"/>
  <text x="728" y="287" fill="#f1f5f9" font-size="10">系统升级通知</text>
  <text x="900" y="287" fill="#64748b" font-size="8">2分钟前</text>

  <rect x="700" y="300" width="240" height="26" rx="6" fill="#0a0e1a" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <circle cx="715" cy="313" r="4" fill="#f59e0b"/>
  <text x="728" y="317" fill="#f1f5f9" font-size="10">配额即将用尽</text>
  <text x="900" y="317" fill="#64748b" font-size="8">1小时前</text>

  <rect x="700" y="330" width="240" height="26" rx="6" fill="#0a0e1a" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <circle cx="715" cy="343" r="4" fill="#22c55e"/>
  <text x="728" y="347" fill="#f1f5f9" font-size="10">知识库索引完成</text>
  <text x="900" y="347" fill="#64748b" font-size="8">昨天</text>

  <!-- Mark read -->
  <text x="820" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">GET /notifications → list → POST /{id}/read</text>
</svg>