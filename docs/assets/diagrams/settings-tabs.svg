<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="st-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#st-bg)"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Settings 页面结构</text>
  <text x="500" y="53" text-anchor="middle" fill="#94a3b8" font-size="12">Settings Page - 6 Tab Panels</text>

  <!-- Tab bar visual -->
  <rect x="40" y="70" width="920" height="36" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <rect x="42" y="72" width="140" height="32" rx="8" fill="#6366f1" opacity="0.9"/>
  <text x="112" y="93" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">模型配置</text>
  <text x="245" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">团队管理</text>
  <text x="375" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">API 密钥</text>
  <text x="505" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">渠道管理</text>
  <text x="640" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">用量计费</text>
  <text x="830" y="93" text-anchor="middle" fill="#94a3b8" font-size="11">通用</text>

  <!-- Tab 1: 模型配置 -->
  <rect x="40" y="125" width="440" height="160" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#st-shadow)"/>
  <text x="60" y="150" fill="#6366f1" font-size="14" font-weight="700">Tab 1: 模型配置</text>
  <line x1="60" y1="160" x2="460" y2="160" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <circle cx="72" cy="180" r="4" fill="#22c55e"/>
  <text x="85" y="184" fill="#f1f5f9" font-size="11">默认模型选择 (Select)</text>
  <circle cx="72" cy="202" r="4" fill="#22c55e"/>
  <text x="85" y="206" fill="#f1f5f9" font-size="11">Temperature 滑动条 (Slider)</text>
  <circle cx="72" cy="224" r="4" fill="#22c55e"/>
  <text x="85" y="228" fill="#f1f5f9" font-size="11">流式输出开关 (Switch)</text>
  <circle cx="72" cy="246" r="4" fill="#22c55e"/>
  <text x="85" y="250" fill="#f1f5f9" font-size="11">Max Tokens 输入</text>
  <rect x="340" y="240" width="125" height="24" rx="6" fill="#0a0e1a" stroke="#6366f1" stroke-width="1"/>
  <text x="402" y="256" text-anchor="middle" fill="#6366f1" font-size="9">/system/settings</text>

  <!-- Tab 2: 团队管理 -->
  <rect x="520" y="125" width="440" height="160" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#st-shadow)"/>
  <text x="540" y="150" fill="#8b5cf6" font-size="14" font-weight="700">Tab 2: 团队管理</text>
  <line x1="540" y1="160" x2="940" y2="160" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <circle cx="552" cy="180" r="4" fill="#22c55e"/>
  <text x="565" y="184" fill="#f1f5f9" font-size="11">用户列表 (Table + Pagination)</text>
  <circle cx="552" cy="202" r="4" fill="#22c55e"/>
  <text x="565" y="206" fill="#f1f5f9" font-size="11">邀请成员 (Modal + Form)</text>
  <circle cx="552" cy="224" r="4" fill="#22c55e"/>
  <text x="565" y="228" fill="#f1f5f9" font-size="11">角色变更 (Select: admin/user)</text>
  <circle cx="552" cy="246" r="4" fill="#22c55e"/>
  <text x="565" y="250" fill="#f1f5f9" font-size="11">删除成员 (Popconfirm)</text>
  <rect x="830" y="240" width="100" height="24" rx="6" fill="#0a0e1a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="880" y="256" text-anchor="middle" fill="#8b5cf6" font-size="9">/users</text>

  <!-- Tab 3: API密钥 -->
  <rect x="40" y="305" width="290" height="160" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#st-shadow)"/>
  <text x="60" y="330" fill="#22c55e" font-size="14" font-weight="700">Tab 3: API 密钥</text>
  <line x1="60" y1="340" x2="310" y2="340" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <circle cx="72" cy="360" r="4" fill="#f59e0b"/>
  <text x="85" y="364" fill="#f1f5f9" font-size="11">创建密钥 (Modal)</text>
  <circle cx="72" cy="382" r="4" fill="#f59e0b"/>
  <text x="85" y="386" fill="#f1f5f9" font-size="11">吊销密钥 (Popconfirm)</text>
  <circle cx="72" cy="404" r="4" fill="#f59e0b"/>
  <text x="85" y="408" fill="#f1f5f9" font-size="11">删除密钥</text>
  <circle cx="72" cy="426" r="4" fill="#f59e0b"/>
  <text x="85" y="430" fill="#f1f5f9" font-size="11">密钥列表 + 脱敏显示</text>
  <rect x="198" y="440" width="110" height="20" rx="6" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="253" y="454" text-anchor="middle" fill="#22c55e" font-size="9">/api-keys</text>

  <!-- Tab 4: 渠道管理 -->
  <rect x="355" y="305" width="290" height="160" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#st-shadow)"/>
  <text x="375" y="330" fill="#3b82f6" font-size="14" font-weight="700">Tab 4: 渠道管理</text>
  <line x1="375" y1="340" x2="625" y2="340" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <circle cx="387" cy="360" r="4" fill="#3b82f6"/>
  <text x="400" y="364" fill="#f1f5f9" font-size="11">渠道状态展示</text>
  <circle cx="387" cy="382" r="4" fill="#3b82f6"/>
  <text x="400" y="386" fill="#f1f5f9" font-size="11">环境变量文档说明</text>
  <circle cx="387" cy="404" r="4" fill="#3b82f6"/>
  <text x="400" y="408" fill="#f1f5f9" font-size="11">只读配置 (后端管控)</text>
  <rect x="498" y="440" width="125" height="20" rx="6" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="454" text-anchor="middle" fill="#3b82f6" font-size="9">/channels/status</text>

  <!-- Tab 5: 用量计费 -->
  <rect x="670" y="305" width="290" height="100" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#st-shadow)"/>
  <text x="690" y="330" fill="#f59e0b" font-size="14" font-weight="700">Tab 5: 用量计费</text>
  <line x1="690" y1="340" x2="940" y2="340" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <circle cx="702" cy="360" r="4" fill="#ef4444"/>
  <text x="715" y="364" fill="#f1f5f9" font-size="11">套餐展示 + 进度条</text>
  <circle cx="702" cy="382" r="4" fill="#ef4444"/>
  <text x="715" y="386" fill="#f1f5f9" font-size="11">升级 Modal + 订单历史</text>
  <rect x="830" y="386" width="110" height="16" rx="4" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="885" y="397" text-anchor="middle" fill="#f59e0b" font-size="8">/billing + /payment</text>

  <!-- Tab 6: 通用 -->
  <rect x="670" y="420" width="290" height="55" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1" filter="url(#st-shadow)"/>
  <text x="690" y="443" fill="#94a3b8" font-size="13" font-weight="700">Tab 6: 通用</text>
  <circle cx="702" cy="460" r="4" fill="#94a3b8"/>
  <text x="715" y="464" fill="#f1f5f9" font-size="10">语言切换 (i18n) + 平台名称</text>
</svg>