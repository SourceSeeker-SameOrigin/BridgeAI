<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
  <defs>
    <linearGradient id="seqPrimary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="seqShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <marker id="seqArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#6366f1"/>
    </marker>
    <marker id="seqArrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#22c55e"/>
    </marker>
    <marker id="seqArrowOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#f59e0b"/>
    </marker>
    <marker id="seqArrowReturn" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M10,0 L0,5 L10,10" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="700" y="32" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">聊天请求生命周期时序图</text>

  <!-- Participant headers -->
  <!-- User -->
  <rect x="30" y="48" width="80" height="36" rx="8" fill="#111827" stroke="#22c55e" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="70" y="72" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="600">User</text>

  <!-- API -->
  <rect x="145" y="48" width="80" height="36" rx="8" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="185" y="72" text-anchor="middle" fill="#a5b4fc" font-family="system-ui" font-size="11" font-weight="600">API</text>

  <!-- Middleware -->
  <rect x="260" y="48" width="95" height="36" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="308" y="72" text-anchor="middle" fill="#c4b5fd" font-family="system-ui" font-size="10" font-weight="600">Middleware</text>

  <!-- ChatService -->
  <rect x="390" y="48" width="100" height="36" rx="8" fill="#111827" stroke="#ec4899" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="440" y="72" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="10" font-weight="600">ChatService</text>

  <!-- LangGraph -->
  <rect x="525" y="48" width="90" height="36" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="570" y="72" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="10" font-weight="600">LangGraph</text>

  <!-- ModelRouter -->
  <rect x="650" y="48" width="100" height="36" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="700" y="72" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="10" font-weight="600">ModelRouter</text>

  <!-- CircuitBreaker -->
  <rect x="785" y="48" width="110" height="36" rx="8" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="840" y="72" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="10" font-weight="600">CircuitBreaker</text>

  <!-- LLMProvider -->
  <rect x="930" y="48" width="100" height="36" rx="8" fill="#111827" stroke="#14b8a6" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="980" y="72" text-anchor="middle" fill="#5eead4" font-family="system-ui" font-size="10" font-weight="600">LLM Provider</text>

  <!-- Database -->
  <rect x="1065" y="48" width="80" height="36" rx="8" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="1105" y="72" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="10" font-weight="600">Database</text>

  <!-- Redis -->
  <rect x="1180" y="48" width="70" height="36" rx="8" fill="#111827" stroke="#ef4444" stroke-width="1.5" filter="url(#seqShadow)"/>
  <text x="1215" y="72" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="10" font-weight="600">Redis</text>

  <!-- Lifelines -->
  <line x1="70" y1="86" x2="70" y2="960" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="185" y1="86" x2="185" y2="960" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="308" y1="86" x2="308" y2="960" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="440" y1="86" x2="440" y2="960" stroke="#ec4899" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="570" y1="86" x2="570" y2="960" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="700" y1="86" x2="700" y2="960" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="840" y1="86" x2="840" y2="960" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="980" y1="86" x2="980" y2="960" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="1105" y1="86" x2="1105" y2="960" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="1215" y1="86" x2="1215" y2="960" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Step numbers and labels on left -->
  <!-- 1. User → API: POST /chat/completions -->
  <text x="15" y="118" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">1</text>
  <line x1="70" y1="115" x2="183" y2="115" stroke="#6366f1" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="128" y="110" text-anchor="middle" fill="#a5b4fc" font-family="system-ui" font-size="9">POST /chat/completions</text>
  <!-- Activation box on API -->
  <rect x="181" y="112" width="8" height="30" rx="2" fill="#6366f1" opacity="0.4"/>

  <!-- 2. API → Middleware: auth + tenant + rate limit + content filter -->
  <text x="15" y="153" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">2</text>
  <line x1="185" y1="150" x2="306" y2="150" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="245" y="145" text-anchor="middle" fill="#c4b5fd" font-family="system-ui" font-size="9">auth + tenant + rate limit</text>
  <rect x="304" y="147" width="8" height="55" rx="2" fill="#8b5cf6" opacity="0.4"/>
  <!-- Content filter sub-step -->
  <text x="320" y="170" fill="#94a3b8" font-family="system-ui" font-size="8">content_filter(DFA)</text>
  <text x="320" y="182" fill="#94a3b8" font-family="system-ui" font-size="8">JWT verify → tenant isolate</text>
  <!-- Return -->
  <line x1="306" y1="200" x2="187" y2="200" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="245" y="196" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">pass</text>

  <!-- 3. Middleware → ChatService: process_chat() -->
  <text x="15" y="223" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">3</text>
  <line x1="185" y1="220" x2="438" y2="220" stroke="#ec4899" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="310" y="215" text-anchor="middle" fill="#f9a8d4" font-family="system-ui" font-size="9">process_chat(request)</text>
  <rect x="436" y="217" width="8" height="640" rx="2" fill="#ec4899" opacity="0.2"/>

  <!-- 4. ChatService → Database: load agent, conversation, history -->
  <text x="15" y="253" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">4</text>
  <line x1="440" y1="250" x2="1103" y2="250" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="770" y="245" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="9">load agent_config, conversation, history</text>
  <rect x="1101" y="247" width="8" height="25" rx="2" fill="#f59e0b" opacity="0.4"/>
  <line x1="1103" y1="270" x2="442" y2="270" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="770" y="266" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">agent + messages[]</text>

  <!-- 5. ChatService → Redis: load few-shot + memory -->
  <text x="15" y="293" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">5</text>
  <line x1="440" y1="290" x2="1213" y2="290" stroke="#ef4444" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="828" y="285" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="9">ZRANGEBYSCORE fewshot:{tenant}:{agent} + HGETALL memory</text>
  <rect x="1211" y="287" width="8" height="25" rx="2" fill="#ef4444" opacity="0.4"/>
  <line x1="1213" y1="310" x2="442" y2="310" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="828" y="306" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">few-shot examples + memory facts</text>

  <!-- 6. ChatService → LangGraph: stages 1-4 -->
  <text x="15" y="338" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">6</text>
  <line x1="440" y1="335" x2="568" y2="335" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="504" y="330" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="9">run_pipeline()</text>
  <rect x="566" y="332" width="8" height="110" rx="2" fill="#f59e0b" opacity="0.3"/>

  <!-- Stage annotations -->
  <rect x="585" y="340" width="185" height="95" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="595" y="356" fill="#f59e0b" font-family="system-ui" font-size="9" font-weight="600">Pipeline Stages:</text>
  <text x="595" y="372" fill="#94a3b8" font-family="system-ui" font-size="8">① 请求接入 → extract context</text>
  <text x="595" y="386" fill="#94a3b8" font-family="system-ui" font-size="8">② Prompt融合 → 4-layer merge</text>
  <text x="595" y="400" fill="#94a3b8" font-family="system-ui" font-size="8">③ 模型路由 → select_model()</text>
  <text x="595" y="414" fill="#94a3b8" font-family="system-ui" font-size="8">④ 工具选择 → validate tools</text>

  <!-- 7. LangGraph → ModelRouter: select model -->
  <text x="15" y="388" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">7</text>
  <line x1="570" y1="385" x2="698" y2="385" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="634" y="380" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="8">select_model(5L)</text>
  <rect x="696" y="382" width="8" height="25" rx="2" fill="#3b82f6" opacity="0.4"/>
  <line x1="698" y1="405" x2="572" y2="405" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="634" y="401" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">ModelSelection</text>

  <!-- Return pipeline state -->
  <line x1="568" y1="440" x2="442" y2="440" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="504" y="436" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">PipelineState</text>

  <!-- 8. ChatService → CircuitBreaker: call_with_fallback -->
  <text x="15" y="468" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">8</text>
  <line x1="440" y1="465" x2="838" y2="465" stroke="#ef4444" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="640" y="460" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="9">call_with_fallback(prompt, model)</text>
  <rect x="836" y="462" width="8" height="60" rx="2" fill="#ef4444" opacity="0.3"/>

  <!-- 9. CircuitBreaker → LLMProvider: chat() with streaming -->
  <text x="15" y="493" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">9</text>
  <line x1="840" y1="490" x2="978" y2="490" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="910" y="485" text-anchor="middle" fill="#5eead4" font-family="system-ui" font-size="9">chat(stream=True)</text>
  <rect x="976" y="487" width="8" height="35" rx="2" fill="#14b8a6" opacity="0.4"/>

  <!-- 10. LLMProvider → ChatService: SSE chunks -->
  <text x="15" y="533" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">10</text>
  <line x1="978" y1="520" x2="842" y2="520" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="910" y="516" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">SSE chunks (async gen)</text>
  <line x1="838" y1="530" x2="442" y2="530" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>

  <!-- Tool call loop annotation -->
  <rect x="790" y="545" width="220" height="50" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="800" y="562" fill="#ef4444" font-family="system-ui" font-size="9" font-weight="600">Tool Call Loop (max 5 rounds)</text>
  <text x="800" y="578" fill="#94a3b8" font-family="system-ui" font-size="8">MCP Gateway → execute → re-prompt</text>
  <text x="800" y="590" fill="#94a3b8" font-family="system-ui" font-size="8">Plugin/Delegate branching</text>

  <!-- 11. ChatService → User: SSE events -->
  <text x="15" y="618" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">11</text>
  <line x1="440" y1="615" x2="72" y2="615" stroke="#22c55e" stroke-width="1.5" marker-end="url(#seqArrowReturn)"/>
  <text x="256" y="610" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="9">SSE: content | tool_call | analysis | done</text>

  <!-- SSE event types annotation -->
  <rect x="80" y="625" width="210" height="65" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="90" y="641" fill="#22c55e" font-family="system-ui" font-size="9" font-weight="600">SSE Event Types:</text>
  <text x="90" y="655" fill="#94a3b8" font-family="system-ui" font-size="8">event:content  → 流式文本片段</text>
  <text x="90" y="668" fill="#94a3b8" font-family="system-ui" font-size="8">event:tool_call → 工具调用状态</text>
  <text x="90" y="681" fill="#94a3b8" font-family="system-ui" font-size="8">event:done     → 结束信号</text>

  <!-- 12. ChatService → Database: save messages + analysis -->
  <text x="15" y="710" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">12</text>
  <line x1="440" y1="707" x2="1103" y2="707" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="770" y="702" text-anchor="middle" fill="#fcd34d" font-family="system-ui" font-size="9">INSERT messages + message_intents + message_emotions</text>
  <rect x="1101" y="704" width="8" height="20" rx="2" fill="#f59e0b" opacity="0.4"/>

  <!-- Save key_facts annotation -->
  <rect x="1030" y="730" width="160" height="40" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="1040" y="746" fill="#f59e0b" font-family="system-ui" font-size="8" font-weight="600">Persist Analysis:</text>
  <text x="1040" y="760" fill="#94a3b8" font-family="system-ui" font-size="8">intent + emotion + key_facts</text>

  <!-- 13. ChatService → Redis: store memory + few-shot -->
  <text x="15" y="790" fill="#6366f1" font-family="system-ui" font-size="10" font-weight="700">13</text>
  <line x1="440" y1="787" x2="1213" y2="787" stroke="#ef4444" stroke-width="1.5" marker-end="url(#seqArrow)"/>
  <text x="828" y="782" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="9">HSET memory:{key} + ZADD fewshot (if rating &gt;= 4)</text>
  <rect x="1211" y="784" width="8" height="20" rx="2" fill="#ef4444" opacity="0.4"/>

  <!-- Few-shot annotation -->
  <rect x="1130" y="810" width="155" height="40" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="1140" y="826" fill="#ef4444" font-family="system-ui" font-size="8" font-weight="600">Feedback Loop:</text>
  <text x="1140" y="840" fill="#94a3b8" font-family="system-ui" font-size="8">rating &gt;= 4 → ZSET few-shot pool</text>

  <!-- Final return -->
  <line x1="440" y1="860" x2="187" y2="860" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#seqArrowReturn)"/>
  <text x="310" y="856" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="8">ChatResponse (usage + metadata)</text>

  <!-- Footer -->
  <text x="700" y="980" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="11">Chat Request Lifecycle — from SSE stream to persistence</text>
</svg>