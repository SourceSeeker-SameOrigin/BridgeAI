<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="1100" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fcs-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="fcs-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="fcs-arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="fcs-arr-r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="fcs-arr-g" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1100" height="500" fill="url(#fcs-bg)"/>

  <text x="550" y="36" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Fallback Chain 时序图</text>
  <text x="550" y="56" text-anchor="middle" fill="#94a3b8" font-size="13">CircuitBreaker per-model state tracking with fallback chain</text>

  <!-- Participants -->
  <g transform="translate(100, 85)">
    <rect x="-55" y="-16" width="110" height="32" rx="10" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#fcs-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#6366f1" font-size="12" font-weight="600">ChatService</text>
  </g>
  <line x1="100" y1="101" x2="100" y2="465" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <g transform="translate(330, 85)">
    <rect x="-65" y="-16" width="130" height="32" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#fcs-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">CircuitBreaker</text>
  </g>
  <line x1="330" y1="101" x2="330" y2="465" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <g transform="translate(560, 85)">
    <rect x="-65" y="-16" width="130" height="32" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#fcs-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">Primary Model</text>
  </g>
  <line x1="560" y1="101" x2="560" y2="465" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <g transform="translate(780, 85)">
    <rect x="-55" y="-16" width="110" height="32" rx="10" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#fcs-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">Fallback[0]</text>
  </g>
  <line x1="780" y1="101" x2="780" y2="465" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <g transform="translate(980, 85)">
    <rect x="-55" y="-16" width="110" height="32" rx="10" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#fcs-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Fallback[1]</text>
  </g>
  <line x1="980" y1="101" x2="980" y2="465" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- 1. Request -->
  <line x1="105" y1="130" x2="325" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#fcs-arr)"/>
  <text x="215" y="123" text-anchor="middle" fill="#6366f1" font-size="11">call(prompt)</text>

  <!-- 2. Check primary state -->
  <rect x="325" y="140" width="10" height="25" rx="2" fill="#f59e0b" opacity="0.4"/>
  <text x="350" y="157" fill="#94a3b8" font-size="10">check state[primary]</text>

  <!-- State box -->
  <g transform="translate(480, 155)">
    <rect x="-55" y="-12" width="110" height="24" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#22c55e" font-size="10">CLOSED (healthy)</text>
  </g>

  <!-- 3. Try primary -->
  <line x1="335" y1="180" x2="555" y2="180" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#fcs-arr)"/>
  <text x="445" y="173" text-anchor="middle" fill="#f59e0b" font-size="11">try call primary</text>

  <!-- 4. Primary fails -->
  <line x1="555" y1="210" x2="335" y2="210" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#fcs-arr-r)"/>
  <text x="445" y="203" text-anchor="middle" fill="#ef4444" font-size="11">Error / Timeout</text>

  <!-- Record failure -->
  <rect x="325" y="220" width="10" height="20" rx="2" fill="#ef4444" opacity="0.4"/>
  <text x="350" y="234" fill="#ef4444" font-size="10">record_failure(primary)</text>

  <!-- State change indicator -->
  <g transform="translate(480, 235)">
    <rect x="-55" y="-12" width="110" height="24" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="10">failures: 3 → OPEN</text>
  </g>

  <!-- 5. Try fallback[0] -->
  <line x1="335" y1="260" x2="775" y2="260" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#fcs-arr)"/>
  <text x="555" y="253" text-anchor="middle" fill="#8b5cf6" font-size="11">try fallback[0]</text>

  <!-- 6. Fallback[0] fails -->
  <line x1="775" y1="290" x2="335" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#fcs-arr-r)"/>
  <text x="555" y="283" text-anchor="middle" fill="#ef4444" font-size="11">Error / Timeout</text>

  <!-- Record failure -->
  <rect x="325" y="300" width="10" height="18" rx="2" fill="#ef4444" opacity="0.4"/>
  <text x="350" y="314" fill="#ef4444" font-size="10">record_failure(fallback[0])</text>

  <!-- 7. Try fallback[1] -->
  <line x1="335" y1="335" x2="975" y2="335" stroke="#22c55e" stroke-width="1.5" marker-end="url(#fcs-arr)"/>
  <text x="655" y="328" text-anchor="middle" fill="#22c55e" font-size="11">try fallback[1]</text>

  <!-- 8. Success! -->
  <line x1="975" y1="365" x2="335" y2="365" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#fcs-arr-g)"/>
  <text x="655" y="358" text-anchor="middle" fill="#22c55e" font-size="11">Success response</text>

  <!-- 9. Return to ChatService -->
  <line x1="325" y1="395" x2="105" y2="395" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#fcs-arr-g)"/>
  <text x="215" y="388" text-anchor="middle" fill="#22c55e" font-size="11">return response</text>

  <!-- Per-model state tracking legend -->
  <g transform="translate(50, 435)">
    <rect x="0" y="-12" width="400" height="30" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
    <text x="15" y="6" fill="#94a3b8" font-size="10">Per-model state:</text>
    <circle cx="140" cy="3" r="5" fill="#22c55e"/>
    <text x="150" y="7" fill="#94a3b8" font-size="10">CLOSED</text>
    <circle cx="210" cy="3" r="5" fill="#ef4444"/>
    <text x="220" y="7" fill="#94a3b8" font-size="10">OPEN</text>
    <circle cx="270" cy="3" r="5" fill="#f59e0b"/>
    <text x="280" y="7" fill="#94a3b8" font-size="10">HALF_OPEN</text>
  </g>

  <!-- Skip note -->
  <g transform="translate(700, 435)">
    <rect x="0" y="-12" width="350" height="30" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
    <text x="175" y="6" text-anchor="middle" fill="#94a3b8" font-size="10">OPEN state → skip model, try next fallback directly</text>
  </g>
</svg>