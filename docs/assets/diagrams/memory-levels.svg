<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ml-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="ml-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ml-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ml-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="ml-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="url(#ml-bg)"/>
  <text x="500" y="45" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">3 层记忆架构</text>
  <text x="500" y="70" fill="#94a3b8" font-size="13" text-anchor="middle">Working Memory / Short-term / Long-term</text>

  <!-- Layer 1: Working Memory -->
  <rect x="50" y="100" width="270" height="380" rx="12" fill="url(#ml-green)" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="70" y="120" width="230" height="40" rx="8" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="185" y="146" fill="#22c55e" font-size="15" font-weight="700" text-anchor="middle">Working Memory</text>
  <text x="185" y="185" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">Python dict</text>
  <text x="185" y="210" fill="#94a3b8" font-size="12" text-anchor="middle">Session-scoped</text>
  <rect x="80" y="235" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="185" y="258" fill="#94a3b8" font-size="11" text-anchor="middle">scope: 当前会话</text>
  <text x="185" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">TTL: 会话结束即销毁</text>
  <rect x="80" y="310" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="185" y="333" fill="#22c55e" font-size="11" text-anchor="middle">最近对话上下文</text>
  <text x="185" y="353" fill="#22c55e" font-size="11" text-anchor="middle">临时变量 &amp; 状态</text>
  <circle cx="185" cy="420" r="25" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.4"/>
  <text x="185" y="425" fill="#22c55e" font-size="20" text-anchor="middle">L1</text>

  <!-- Layer 2: Short-term -->
  <rect x="365" y="100" width="270" height="380" rx="12" fill="url(#ml-blue)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="385" y="120" width="230" height="40" rx="8" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="1"/>
  <text x="500" y="146" fill="#3b82f6" font-size="15" font-weight="700" text-anchor="middle">Short-term Memory</text>
  <text x="500" y="185" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">Redis</text>
  <text x="500" y="210" fill="#94a3b8" font-size="12" text-anchor="middle">7 天 TTL</text>
  <rect x="395" y="235" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="500" y="258" fill="#94a3b8" font-size="11" text-anchor="middle">scope: 跨会话持久</text>
  <text x="500" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">TTL: 7 天自动过期</text>
  <rect x="395" y="310" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="500" y="333" fill="#3b82f6" font-size="11" text-anchor="middle">用户偏好摘要</text>
  <text x="500" y="353" fill="#3b82f6" font-size="11" text-anchor="middle">近期交互模式</text>
  <circle cx="500" cy="420" r="25" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="500" y="425" fill="#3b82f6" font-size="20" text-anchor="middle">L2</text>

  <!-- Layer 3: Long-term -->
  <rect x="680" y="100" width="270" height="380" rx="12" fill="url(#ml-purple)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="700" y="120" width="230" height="40" rx="8" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1"/>
  <text x="815" y="146" fill="#8b5cf6" font-size="15" font-weight="700" text-anchor="middle">Long-term Memory</text>
  <text x="815" y="185" fill="#f1f5f9" font-size="13" text-anchor="middle" font-weight="600">DB + pgvector</text>
  <text x="815" y="210" fill="#94a3b8" font-size="12" text-anchor="middle">Persistent</text>
  <rect x="710" y="235" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="815" y="258" fill="#94a3b8" font-size="11" text-anchor="middle">scope: 永久存储</text>
  <text x="815" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">向量相似度检索</text>
  <rect x="710" y="310" width="210" height="60" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
  <text x="815" y="333" fill="#8b5cf6" font-size="11" text-anchor="middle">关键知识 &amp; 事实</text>
  <text x="815" y="353" fill="#8b5cf6" font-size="11" text-anchor="middle">importance >= 0.7</text>
  <circle cx="815" cy="420" r="25" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4"/>
  <text x="815" y="425" fill="#8b5cf6" font-size="20" text-anchor="middle">L3</text>

  <!-- Write path arrows -->
  <defs>
    <marker id="ml-arrow-w" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="ml-arrow-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Write path -->
  <path d="M320 510 L365 510" stroke="#f59e0b" stroke-width="2" marker-end="url(#ml-arrow-w)" stroke-dasharray="6,3"/>
  <path d="M635 510 L680 510" stroke="#f59e0b" stroke-width="2" marker-end="url(#ml-arrow-w)" stroke-dasharray="6,3"/>
  <rect x="50" y="498" width="270" height="28" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.3"/>
  <text x="185" y="517" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">WRITE: importance >= 0.7 --> DB</text>

  <!-- Read path -->
  <path d="M680 555 L635 555" stroke="#22c55e" stroke-width="2" marker-end="url(#ml-arrow-r)"/>
  <path d="M365 555 L320 555" stroke="#22c55e" stroke-width="2" marker-end="url(#ml-arrow-r)"/>
  <rect x="680" y="543" width="270" height="28" rx="6" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="815" y="562" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="600">READ: merge 3 levels</text>

  <rect x="365" y="543" width="270" height="28" rx="6" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="500" y="562" fill="#22c55e" font-size="11" text-anchor="middle" font-weight="600">L3 + L2 + L1 = Context</text>
</svg>