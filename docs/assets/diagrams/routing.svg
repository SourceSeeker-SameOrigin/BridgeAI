<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/><stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/></filter>
  </defs>
  <rect width="1000" height="600" fill="#0a0e1a"/>
  <text x="500" y="38" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">路由架构 - React Router</text>

  <!-- Root "/" -->
  <rect x="400" y="60" width="200" height="44" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <text x="500" y="87" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">/  (RootIndex)</text>

  <!-- Arrow down from root -->
  <line x1="500" y1="104" x2="500" y2="130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowP)"/>
  <defs><marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker></defs>

  <!-- Check Auth diamond -->
  <polygon points="500,130 560,160 500,190 440,160" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="164" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="600">Auth?</text>

  <!-- No auth -> Landing -->
  <line x1="440" y1="160" x2="280" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="360" y="152" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="10">No</text>
  <rect x="180" y="140" width="100" height="40" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5"/>
  <text x="230" y="164" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="12">Landing</text>

  <!-- Has auth -> Dashboard -->
  <line x1="560" y1="160" x2="700" y2="160" stroke="#22c55e" stroke-width="2"/>
  <text x="630" y="152" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">Yes</text>
  <rect x="700" y="140" width="110" height="40" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.5"/>
  <text x="755" y="164" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="12">Dashboard</text>

  <!-- Public Routes -->
  <text x="130" y="230" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="600">Public Routes</text>
  <rect x="50" y="245" width="90" height="36" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="95" y="267" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12">/login</text>
  <rect x="155" y="245" width="90" height="36" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="267" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12">/docs</text>

  <!-- AuthGuard box -->
  <rect x="310" y="220" width="380" height="50" rx="12" fill="url(#orangeGrad)" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="250" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="14" font-weight="600">AuthGuard</text>

  <!-- Arrow from AuthGuard to AppLayout -->
  <line x1="500" y1="270" x2="500" y2="295" stroke="#f59e0b" stroke-width="2"/>

  <!-- AppLayout -->
  <rect x="310" y="295" width="380" height="40" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="320" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="14" font-weight="600">AppLayout (Sidebar + TopBar + Outlet)</text>

  <!-- Protected Routes Grid -->
  <line x1="500" y1="335" x2="500" y2="360" stroke="#8b5cf6" stroke-width="2"/>

  <!-- Row 1 of routes -->
  <rect x="40" y="370" width="100" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="90" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/dashboard</text>
  <text x="90" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="155" y="370" width="90" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/chat</text>
  <text x="200" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="260" y="370" width="90" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="305" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/agents</text>
  <text x="305" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="365" y="370" width="80" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="405" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/mcp</text>
  <text x="405" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="460" y="370" width="100" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="510" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/knowledge</text>
  <text x="510" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="575" y="370" width="90" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="620" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/plugins</text>
  <text x="620" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="680" y="370" width="80" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="720" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/audit</text>
  <text x="720" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="775" y="370" width="90" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="820" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/settings</text>
  <text x="820" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <rect x="880" y="370" width="90" height="36" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1"/>
  <text x="925" y="392" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="11">/billing</text>
  <text x="925" y="420" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">lazy</text>

  <!-- Connecting lines to routes -->
  <line x1="500" y1="360" x2="90" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="200" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="305" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="405" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="510" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="620" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="720" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="820" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <line x1="500" y1="360" x2="925" y2="370" stroke="#6366f1" stroke-width="1" opacity="0.5"/>

  <!-- Wildcard -->
  <rect x="750" y="220" width="140" height="40" rx="12" fill="#111827" stroke="#ef4444" stroke-width="1.5"/>
  <text x="820" y="244" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="12">* → Navigate /</text>

  <!-- Legend -->
  <rect x="50" y="470" width="900" height="110" rx="12" fill="#111827" opacity="0.5"/>
  <text x="500" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="600">路由分层说明</text>
  <circle cx="100" cy="525" r="6" fill="#3b82f6"/><text x="115" y="529" fill="#94a3b8" font-family="system-ui" font-size="11">公开路由 - 无需认证</text>
  <circle cx="300" cy="525" r="6" fill="#f59e0b"/><text x="315" y="529" fill="#94a3b8" font-family="system-ui" font-size="11">AuthGuard - 检查 Token</text>
  <circle cx="530" cy="525" r="6" fill="#6366f1"/><text x="545" y="529" fill="#94a3b8" font-family="system-ui" font-size="11">受保护路由 - Lazy Loading</text>
  <circle cx="760" cy="525" r="6" fill="#ef4444"/><text x="775" y="529" fill="#94a3b8" font-family="system-ui" font-size="11">通配符 - 重定向到首页</text>
  <text x="500" y="560" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="10">所有受保护路由均使用 React.lazy() 按需加载，减少首屏包体积</text>
</svg>
