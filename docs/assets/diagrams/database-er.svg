<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="1200" height="650">
  <defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/></filter></defs>
  <rect width="1200" height="650" fill="#0a0e1a"/>
  <text x="600" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">数据库 ER 图 - PostgreSQL 16 + Milvus</text>
  <rect x="30" y="55" width="195" height="175" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="55" width="195" height="28" rx="12" fill="#22c55e" opacity="0.2"/>
  <text x="127" y="74" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="700">users</text>
  <text x="42" y="98" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="42" y="114" fill="#f1f5f9" font-family="system-ui" font-size="10">username, email</text>
  <text x="42" y="130" fill="#f1f5f9" font-family="system-ui" font-size="10">password_hash</text>
  <text x="42" y="146" fill="#f1f5f9" font-family="system-ui" font-size="10">role ENUM</text>
  <text x="42" y="162" fill="#f59e0b" font-family="system-ui" font-size="10">FK tenant_id</text>
  <text x="42" y="178" fill="#94a3b8" font-family="system-ui" font-size="9">is_active, created_at</text>
  <text x="42" y="218" fill="#64748b" font-family="system-ui" font-size="9">bcrypt(rounds=12)</text>
  <rect x="250" y="55" width="205" height="195" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="250" y="55" width="205" height="28" rx="12" fill="#6366f1" opacity="0.2"/>
  <text x="352" y="74" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="13" font-weight="700">agents</text>
  <text x="262" y="98" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="262" y="114" fill="#f1f5f9" font-family="system-ui" font-size="10">name, description</text>
  <text x="262" y="130" fill="#f1f5f9" font-family="system-ui" font-size="10">system_prompt TEXT</text>
  <text x="262" y="146" fill="#f1f5f9" font-family="system-ui" font-size="10">model_config JSONB</text>
  <text x="262" y="162" fill="#f1f5f9" font-family="system-ui" font-size="10">tools, plugins JSONB</text>
  <text x="262" y="178" fill="#f59e0b" font-family="system-ui" font-size="10">FK knowledge_base_id</text>
  <text x="262" y="194" fill="#f59e0b" font-family="system-ui" font-size="10">FK tenant_id</text>
  <text x="262" y="210" fill="#94a3b8" font-family="system-ui" font-size="9">is_active, created_at</text>
  <rect x="480" y="55" width="195" height="155" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="480" y="55" width="195" height="28" rx="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="577" y="74" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="13" font-weight="700">conversations</text>
  <text x="492" y="98" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="492" y="114" fill="#f1f5f9" font-family="system-ui" font-size="10">title VARCHAR</text>
  <text x="492" y="130" fill="#f59e0b" font-family="system-ui" font-size="10">FK user_id UUID</text>
  <text x="492" y="146" fill="#f59e0b" font-family="system-ui" font-size="10">FK agent_id UUID</text>
  <text x="492" y="162" fill="#f59e0b" font-family="system-ui" font-size="10">FK tenant_id UUID</text>
  <text x="492" y="178" fill="#94a3b8" font-family="system-ui" font-size="9">created_at, updated_at</text>
  <rect x="700" y="55" width="210" height="195" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="700" y="55" width="210" height="28" rx="12" fill="#ef4444" opacity="0.2"/>
  <text x="805" y="74" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="13" font-weight="700">messages</text>
  <text x="712" y="98" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="712" y="114" fill="#f59e0b" font-family="system-ui" font-size="10">FK conversation_id</text>
  <text x="712" y="130" fill="#f1f5f9" font-family="system-ui" font-size="10">role (user/assistant/tool)</text>
  <text x="712" y="146" fill="#f1f5f9" font-family="system-ui" font-size="10">content TEXT</text>
  <text x="712" y="162" fill="#f1f5f9" font-family="system-ui" font-size="10">model_used, tokens</text>
  <text x="712" y="178" fill="#3b82f6" font-family="system-ui" font-size="10">intent, emotion (元数据)</text>
  <text x="712" y="194" fill="#94a3b8" font-family="system-ui" font-size="9">created_at</text>
  <rect x="935" y="55" width="235" height="155" rx="12" fill="#111827" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <rect x="935" y="55" width="235" height="28" rx="12" fill="#ec4899" opacity="0.2"/>
  <text x="1052" y="74" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="13" font-weight="700">knowledge_chunks</text>
  <text x="947" y="98" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="947" y="114" fill="#f59e0b" font-family="system-ui" font-size="10">FK document_id UUID</text>
  <text x="947" y="130" fill="#f1f5f9" font-family="system-ui" font-size="10">content TEXT</text>
  <text x="947" y="146" fill="#ec4899" font-family="system-ui" font-size="10" font-weight="600">vector FLOAT_VECTOR(1024)</text>
  <text x="947" y="162" fill="#f1f5f9" font-family="system-ui" font-size="10">chunk_index INT</text>
  <text x="947" y="178" fill="#94a3b8" font-family="system-ui" font-size="9">HNSW索引 (余弦相似度)</text>
  <rect x="30" y="280" width="210" height="160" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="280" width="210" height="28" rx="12" fill="#f59e0b" opacity="0.2"/>
  <text x="135" y="299" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="700">mcp_connectors</text>
  <text x="42" y="324" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="42" y="340" fill="#f1f5f9" font-family="system-ui" font-size="10">name, connector_type</text>
  <text x="42" y="356" fill="#f1f5f9" font-family="system-ui" font-size="10">endpoint_url</text>
  <text x="42" y="372" fill="#f1f5f9" font-family="system-ui" font-size="10">auth_config JSONB (AES加密)</text>
  <text x="42" y="388" fill="#f1f5f9" font-family="system-ui" font-size="10">status ENUM</text>
  <text x="42" y="404" fill="#f59e0b" font-family="system-ui" font-size="10">FK tenant_id</text>
  <text x="42" y="420" fill="#94a3b8" font-family="system-ui" font-size="9">is_deleted, created_at</text>
  <rect x="270" y="280" width="200" height="140" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="270" y="280" width="200" height="28" rx="12" fill="#94a3b8" opacity="0.2"/>
  <text x="370" y="299" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12" font-weight="700">mcp_audit_logs</text>
  <text x="282" y="324" fill="#f59e0b" font-family="system-ui" font-size="10">FK connector_id</text>
  <text x="282" y="340" fill="#f1f5f9" font-family="system-ui" font-size="10">tool_name</text>
  <text x="282" y="356" fill="#f1f5f9" font-family="system-ui" font-size="10">request/response JSONB</text>
  <text x="282" y="372" fill="#f1f5f9" font-family="system-ui" font-size="10">duration_ms, status</text>
  <rect x="500" y="280" width="190" height="140" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="500" y="280" width="190" height="28" rx="12" fill="#3b82f6" opacity="0.2"/>
  <text x="595" y="299" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12" font-weight="700">knowledge_bases</text>
  <text x="512" y="324" fill="#6366f1" font-family="system-ui" font-size="10">PK id UUID</text>
  <text x="512" y="340" fill="#f1f5f9" font-family="system-ui" font-size="10">name, embedding_model</text>
  <text x="512" y="356" fill="#f1f5f9" font-family="system-ui" font-size="10">chunk_size INT</text>
  <text x="512" y="372" fill="#f59e0b" font-family="system-ui" font-size="10">FK tenant_id</text>
  <rect x="30" y="470" width="160" height="70" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="110" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">plugins</text>
  <text x="42" y="520" fill="#64748b" font-family="system-ui" font-size="9">name, config, tenant_id</text>
  <rect x="210" y="470" width="160" height="70" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="290" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">api_keys</text>
  <text x="222" y="520" fill="#64748b" font-family="system-ui" font-size="9">key_hash, scopes, user_id</text>
  <rect x="390" y="470" width="160" height="70" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="470" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">audit_logs</text>
  <text x="402" y="520" fill="#64748b" font-family="system-ui" font-size="9">action, resource, details</text>
  <rect x="570" y="470" width="160" height="70" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="650" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">usage_records</text>
  <text x="582" y="520" fill="#64748b" font-family="system-ui" font-size="9">tokens, model, cost</text>
  <rect x="750" y="470" width="160" height="70" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="830" y="495" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11" font-weight="600">message_ratings</text>
  <text x="762" y="520" fill="#64748b" font-family="system-ui" font-size="9">message_id, rating(1-5)</text>
  <rect x="30" y="570" width="1140" height="45" rx="12" fill="#111827" opacity="0.3"/>
  <text x="200" y="598" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="11">14 核心表</text>
  <text x="420" y="598" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11">所有表含 tenant_id (行级隔离)</text>
  <text x="680" y="598" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="11">Milvus: FLOAT_VECTOR(1024) + HNSW</text>
  <text x="950" y="598" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="11">auth_config: AES-256 加密</text>
</svg>
