<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/></filter>
  </defs>
  <rect width="1000" height="400" fill="#0a0e1a"/>
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">插件开发生命周期</text>

  <!-- Step 1 -->
  <rect x="20" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="100" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="22" font-weight="700">1</text>
  <text x="70" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">创建目录</text>
  <text x="70" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">industries/xxx/</text>

  <line x1="120" y1="110" x2="140" y2="110" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 2 -->
  <rect x="142" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="192" y="100" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="22" font-weight="700">2</text>
  <text x="192" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">继承基类</text>
  <text x="192" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">PluginBase</text>

  <line x1="242" y1="110" x2="262" y2="110" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 3 -->
  <rect x="264" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="314" y="100" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="22" font-weight="700">3</text>
  <text x="314" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">实现工具</text>
  <text x="314" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">get_tools()</text>

  <line x1="364" y1="110" x2="384" y2="110" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 4 -->
  <rect x="386" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="436" y="100" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="22" font-weight="700">4</text>
  <text x="436" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">自动发现</text>
  <text x="436" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">PluginLoader</text>

  <line x1="486" y1="110" x2="506" y2="110" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 5 -->
  <rect x="508" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="558" y="100" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="22" font-weight="700">5</text>
  <text x="558" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">注册</text>
  <text x="558" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">PluginRegistry</text>

  <line x1="608" y1="110" x2="628" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 6 -->
  <rect x="630" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="100" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="22" font-weight="700">6</text>
  <text x="680" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">安装启用</text>
  <text x="680" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">Marketplace</text>

  <line x1="730" y1="110" x2="750" y2="110" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 7 -->
  <rect x="752" y="70" width="100" height="80" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="802" y="100" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="22" font-weight="700">7</text>
  <text x="802" y="120" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">绑定 Agent</text>
  <text x="802" y="140" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">agent.plugins[]</text>

  <line x1="852" y1="110" x2="872" y2="110" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 8 -->
  <rect x="874" y="70" width="106" height="80" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <text x="927" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">8</text>
  <text x="927" y="120" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">对话中执行</text>
  <text x="927" y="140" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="8">execute_tool()</text>

  <!-- Detail sections below -->
  <rect x="20" y="180" width="310" height="200" rx="12" fill="#111827" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="175" y="205" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="13" font-weight="600">开发阶段 (步骤 1-3)</text>
  <text x="40" y="230" fill="#f1f5f9" font-family="system-ui" font-size="11">plugins/industries/your_industry/</text>
  <text x="50" y="252" fill="#94a3b8" font-family="system-ui" font-size="10">__init__.py</text>
  <text x="50" y="270" fill="#94a3b8" font-family="system-ui" font-size="10">plugin.py   (PluginBase 子类)</text>
  <text x="50" y="288" fill="#94a3b8" font-family="system-ui" font-size="10">prompts.py  (可选提示模板)</text>
  <text x="40" y="315" fill="#64748b" font-family="system-ui" font-size="10">必须实现: get_tools() + execute_tool()</text>
  <text x="40" y="335" fill="#64748b" font-family="system-ui" font-size="10">可选实现: get_prompt_templates()</text>
  <text x="40" y="355" fill="#64748b" font-family="system-ui" font-size="10">可选实现: get_system_prompt_extension()</text>

  <rect x="350" y="180" width="310" height="200" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="505" y="205" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="600">注册阶段 (步骤 4-6)</text>
  <text x="370" y="235" fill="#f1f5f9" font-family="system-ui" font-size="11">PluginLoader 扫描 industries/ 目录</text>
  <text x="370" y="260" fill="#f1f5f9" font-family="system-ui" font-size="11">自动发现所有 PluginBase 子类</text>
  <text x="370" y="285" fill="#f1f5f9" font-family="system-ui" font-size="11">注册到 PluginRegistry 单例</text>
  <text x="370" y="310" fill="#f1f5f9" font-family="system-ui" font-size="11">插件市场页面展示元数据</text>
  <text x="370" y="340" fill="#94a3b8" font-family="system-ui" font-size="10">get_metadata() 返回:</text>
  <text x="380" y="358" fill="#64748b" font-family="system-ui" font-size="10">name, display_name, category, version, tools</text>

  <rect x="680" y="180" width="300" height="200" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="830" y="205" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="600">运行阶段 (步骤 7-8)</text>
  <text x="700" y="235" fill="#f1f5f9" font-family="system-ui" font-size="11">Agent 配置绑定插件</text>
  <text x="700" y="260" fill="#f1f5f9" font-family="system-ui" font-size="11">Stage 2: 注入 system_prompt_extension</text>
  <text x="700" y="285" fill="#f1f5f9" font-family="system-ui" font-size="11">Stage 3: 合并 plugin tools</text>
  <text x="700" y="310" fill="#f1f5f9" font-family="system-ui" font-size="11">Stage 5: LLM 决定调用 plugin tool</text>
  <text x="700" y="335" fill="#f1f5f9" font-family="system-ui" font-size="11">execute_tool(name, args) 执行</text>
  <text x="700" y="358" fill="#22c55e" font-family="system-ui" font-size="10">结果返回给 LLM 继续对话</text>
</svg>
