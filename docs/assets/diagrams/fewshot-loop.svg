<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="fs-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <marker id="fs-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="fs-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
  <rect width="1000" height="500" fill="url(#fs-bg)"/>
  <text x="500" y="40" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">Few-shot 学习闭环</text>
  <text x="500" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">User Feedback Driven Continuous Improvement Loop</text>

  <!-- Step 1: User rates >= 4 -->
  <rect x="50" y="110" width="200" height="80" rx="12" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="150" y="140" fill="#22c55e" font-size="14" font-weight="700" text-anchor="middle">User 评分</text>
  <text x="150" y="162" fill="#22c55e" font-size="12" text-anchor="middle">rating >= 4</text>
  <text x="150" y="180" fill="#94a3b8" font-size="10" text-anchor="middle">触发存储优质样例</text>

  <!-- Arrow 1->2 -->
  <path d="M250 150 L330 150" stroke="#6366f1" stroke-width="2" marker-end="url(#fs-arr)"/>
  <text x="290" y="142" fill="#6366f1" font-size="10" text-anchor="middle">trigger</text>

  <!-- Step 2: store_fewshot_example -->
  <rect x="340" y="110" width="220" height="80" rx="12" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="450" y="140" fill="#6366f1" font-size="13" font-weight="700" text-anchor="middle">store_fewshot_example</text>
  <text x="450" y="162" fill="#94a3b8" font-size="11" text-anchor="middle">提取 Q&amp;A pair</text>
  <text x="450" y="180" fill="#94a3b8" font-size="11" text-anchor="middle">计算 score 权重</text>

  <!-- Arrow 2->3 -->
  <path d="M560 150 L650 150" stroke="#6366f1" stroke-width="2" marker-end="url(#fs-arr)"/>

  <!-- Step 3: Redis ZSET -->
  <rect x="660" y="100" width="280" height="100" rx="12" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="800" y="130" fill="#ef4444" font-size="14" font-weight="700" text-anchor="middle">Redis ZSET</text>
  <rect x="685" y="140" width="230" height="24" rx="4" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="800" y="157" fill="#f59e0b" font-size="11" text-anchor="middle" font-family="monospace">fewshot:{tenant_id}:{agent_id}</text>
  <text x="800" y="185" fill="#94a3b8" font-size="10" text-anchor="middle">score = rating * recency_weight</text>

  <!-- Arrow 3->4 (down) -->
  <path d="M800 200 L800 260" stroke="#6366f1" stroke-width="2" marker-end="url(#fs-arr)"/>
  <text x="820" y="235" fill="#6366f1" font-size="10" text-anchor="start">next request</text>

  <!-- Step 4: load_fewshot_examples -->
  <rect x="660" y="270" width="280" height="80" rx="12" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="800" y="300" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">load_fewshot_examples</text>
  <text x="800" y="322" fill="#94a3b8" font-size="11" text-anchor="middle">ZREVRANGE top-3 by score</text>
  <text x="800" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">返回最优样例</text>

  <!-- Arrow 4->5 (left) -->
  <path d="M660 310 L560 310" stroke="#6366f1" stroke-width="2" marker-end="url(#fs-arr)"/>

  <!-- Step 5: Inject Prompt Layer 3 -->
  <rect x="340" y="270" width="220" height="80" rx="12" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="450" y="298" fill="#8b5cf6" font-size="13" font-weight="700" text-anchor="middle">Inject Prompt</text>
  <text x="450" y="318" fill="#94a3b8" font-size="11" text-anchor="middle">Layer 3: Few-shot Examples</text>
  <text x="450" y="338" fill="#94a3b8" font-size="11" text-anchor="middle">嵌入系统提示词</text>

  <!-- Arrow 5->6 (left) -->
  <path d="M340 310 L250 310" stroke="#6366f1" stroke-width="2" marker-end="url(#fs-arr)"/>

  <!-- Step 6: Better Response -->
  <rect x="50" y="270" width="200" height="80" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="150" y="300" fill="#f59e0b" font-size="14" font-weight="700" text-anchor="middle">Better Response</text>
  <text x="150" y="322" fill="#94a3b8" font-size="11" text-anchor="middle">基于优质样例生成</text>
  <text x="150" y="340" fill="#94a3b8" font-size="11" text-anchor="middle">更高质量的回复</text>

  <!-- Arrow 6->1 (up, closing the loop) -->
  <path d="M150 270 L150 190" stroke="#22c55e" stroke-width="2" marker-end="url(#fs-arr-g)" stroke-dasharray="6,3"/>
  <text x="130" y="235" fill="#22c55e" font-size="10" text-anchor="end">User rates again</text>

  <!-- Loop indicator -->
  <rect x="380" y="400" width="240" height="60" rx="10" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="500" y="425" fill="#22c55e" font-size="13" font-weight="700" text-anchor="middle">Continuous Loop</text>
  <text x="500" y="445" fill="#94a3b8" font-size="11" text-anchor="middle">评分越高 --> 样例越优 --> 回复越好</text>
</svg>