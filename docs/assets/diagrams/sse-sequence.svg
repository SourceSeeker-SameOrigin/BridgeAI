<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="ss-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="ss-arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <marker id="ss-arrow-green" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="ss-arrow-purple" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#ss-bg)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">SSE 流式对话时序图</text>
  <text x="600" y="55" text-anchor="middle" fill="#94a3b8" font-size="13">Server-Sent Events Streaming Sequence</text>

  <!-- Participants -->
  <rect x="60" y="75" width="90" height="34" rx="12" fill="#6366f1" filter="url(#ss-shadow)"/>
  <text x="105" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">User</text>

  <rect x="220" y="75" width="100" height="34" rx="12" fill="#8b5cf6" filter="url(#ss-shadow)"/>
  <text x="270" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">InputBar</text>

  <rect x="400" y="75" width="110" height="34" rx="12" fill="#8b5cf6" filter="url(#ss-shadow)"/>
  <text x="455" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">ChatPage</text>

  <rect x="590" y="75" width="145" height="34" rx="12" fill="#8b5cf6" filter="url(#ss-shadow)"/>
  <text x="663" y="97" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">sendMessageSSE</text>

  <rect x="830" y="75" width="120" height="34" rx="12" fill="#22c55e" opacity="0.8" filter="url(#ss-shadow)"/>
  <text x="890" y="97" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Backend</text>

  <!-- Lifelines -->
  <line x1="105" y1="109" x2="105" y2="770" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="270" y1="109" x2="270" y2="770" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="455" y1="109" x2="455" y2="770" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="663" y1="109" x2="663" y2="770" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="890" y1="109" x2="890" y2="770" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Step 1: User types -->
  <line x1="105" y1="140" x2="260" y2="140" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <text x="183" y="134" text-anchor="middle" fill="#f1f5f9" font-size="10">输入消息 + Enter</text>

  <!-- Step 2: InputBar -> ChatPage -->
  <line x1="270" y1="165" x2="445" y2="165" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ss-arrow-purple)"/>
  <text x="358" y="159" text-anchor="middle" fill="#94a3b8" font-size="10">onSend(message)</text>

  <!-- Step 3: ChatPage -> sendMessageSSE -->
  <line x1="455" y1="190" x2="653" y2="190" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ss-arrow-purple)"/>
  <text x="554" y="184" text-anchor="middle" fill="#94a3b8" font-size="10">setIsStreaming(true)</text>

  <!-- Step 4: sendMessageSSE -> Backend -->
  <line x1="663" y1="215" x2="880" y2="215" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <text x="772" y="209" text-anchor="middle" fill="#f1f5f9" font-size="10">fetch POST /chat/stream</text>

  <!-- SSE Stream box -->
  <rect x="475" y="240" width="440" height="390" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#ss-shadow)"/>
  <text x="695" y="260" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">SSE Stream</text>
  <line x1="490" y1="268" x2="900" y2="268" stroke="rgba(148,163,184,0.1)"/>

  <!-- SSE event 1: meta -->
  <line x1="880" y1="290" x2="673" y2="290" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="700" y="278" width="175" height="20" rx="6" fill="#3b82f6" opacity="0.1"/>
  <text x="788" y="292" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">type:"meta" {conversationId}</text>

  <!-- SSE event 2: content -->
  <line x1="880" y1="320" x2="673" y2="320" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="735" y="308" width="140" height="20" rx="6" fill="#22c55e" opacity="0.1"/>
  <text x="805" y="322" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">type:"content" "你"</text>

  <line x1="880" y1="348" x2="673" y2="348" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="735" y="336" width="140" height="20" rx="6" fill="#22c55e" opacity="0.1"/>
  <text x="805" y="350" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">type:"content" "好"</text>

  <!-- SSE event 3: tool_call -->
  <line x1="880" y1="380" x2="673" y2="380" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="700" y="368" width="175" height="20" rx="6" fill="#f59e0b" opacity="0.1"/>
  <text x="788" y="382" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">type:"tool_call" mysql_query</text>

  <!-- SSE event 4: content again -->
  <line x1="880" y1="410" x2="673" y2="410" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="710" y="398" width="165" height="20" rx="6" fill="#22c55e" opacity="0.1"/>
  <text x="793" y="412" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">type:"content" "查询结果..."</text>

  <!-- SSE event 5: analysis (filtered) -->
  <line x1="880" y1="440" x2="673" y2="440" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="710" y="428" width="165" height="20" rx="6" fill="#94a3b8" opacity="0.05" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="793" y="442" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.6">type:"analysis" (filtered)</text>

  <!-- SSE event 6: done -->
  <line x1="880" y1="470" x2="673" y2="470" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ss-arrow)"/>
  <rect x="755" y="458" width="120" height="20" rx="6" fill="#6366f1" opacity="0.1"/>
  <text x="815" y="472" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">type:"done"</text>

  <!-- More content dots -->
  <text x="805" y="362" text-anchor="middle" fill="#94a3b8" font-size="14" opacity="0.5">...</text>

  <!-- Frontend side handlers (left side) -->
  <rect x="30" y="240" width="420" height="390" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1" filter="url(#ss-shadow)"/>
  <text x="240" y="260" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Frontend Handlers</text>
  <line x1="45" y1="268" x2="435" y2="268" stroke="rgba(148,163,184,0.1)"/>

  <!-- meta handler -->
  <line x1="663" y1="290" x2="455" y2="290" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="50" y="278" width="395" height="28" rx="8" fill="#3b82f6" opacity="0.06"/>
  <text x="60" y="296" fill="#3b82f6" font-size="11" font-weight="600">meta</text>
  <text x="110" y="296" fill="#94a3b8" font-size="10">→ update realMsgId, conversationId</text>

  <!-- content handler -->
  <rect x="50" y="318" width="395" height="50" rx="8" fill="#22c55e" opacity="0.06"/>
  <text x="60" y="336" fill="#22c55e" font-size="11" font-weight="600">content</text>
  <text x="120" y="336" fill="#94a3b8" font-size="10">→ append to message buffer</text>
  <text x="60" y="356" fill="#94a3b8" font-size="10">filter &lt;analysis&gt; tags | streaming render with Markdown</text>

  <!-- tool_call handler -->
  <rect x="50" y="376" width="395" height="28" rx="8" fill="#f59e0b" opacity="0.06"/>
  <text x="60" y="394" fill="#f59e0b" font-size="11" font-weight="600">tool_call</text>
  <text x="130" y="394" fill="#94a3b8" font-size="10">→ show ToolCallCard component</text>

  <!-- analysis handler -->
  <rect x="50" y="430" width="395" height="28" rx="8" fill="#94a3b8" opacity="0.04"/>
  <text x="60" y="448" fill="#94a3b8" font-size="11" font-weight="600" opacity="0.6">analysis</text>
  <text x="130" y="448" fill="#94a3b8" font-size="10" opacity="0.6">→ filtered out (not displayed to user)</text>

  <!-- done handler -->
  <rect x="50" y="470" width="395" height="50" rx="8" fill="#6366f1" opacity="0.06"/>
  <text x="60" y="488" fill="#6366f1" font-size="11" font-weight="600">done</text>
  <text x="100" y="488" fill="#94a3b8" font-size="10">→ setIsStreaming(false)</text>
  <text x="60" y="508" fill="#94a3b8" font-size="10">finalize message | save to history | enable input</text>

  <!-- Connection arrows between the two boxes -->
  <line x1="455" y1="340" x2="475" y2="340" stroke="#22c55e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="455" y1="390" x2="475" y2="390" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="455" y1="440" x2="475" y2="440" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.3"/>
  <line x1="455" y1="480" x2="475" y2="480" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Final update back to user -->
  <line x1="455" y1="660" x2="270" y2="660" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ss-arrow-green)"/>
  <text x="363" y="654" text-anchor="middle" fill="#94a3b8" font-size="10">re-enable input</text>

  <line x1="270" y1="680" x2="115" y2="680" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ss-arrow-green)"/>
  <text x="193" y="674" text-anchor="middle" fill="#94a3b8" font-size="10">显示完整回复</text>

  <!-- Legend -->
  <g transform="translate(30, 720)">
    <rect width="1140" height="50" rx="10" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
    <line x1="20" y1="25" x2="55" y2="25" stroke="#3b82f6" stroke-width="2"/>
    <text x="65" y="29" fill="#94a3b8" font-size="11">meta</text>
    <line x1="115" y1="25" x2="150" y2="25" stroke="#22c55e" stroke-width="2"/>
    <text x="160" y="29" fill="#94a3b8" font-size="11">content</text>
    <line x1="225" y1="25" x2="260" y2="25" stroke="#f59e0b" stroke-width="2"/>
    <text x="270" y="29" fill="#94a3b8" font-size="11">tool_call</text>
    <line x1="345" y1="25" x2="380" y2="25" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="390" y="29" fill="#94a3b8" font-size="11">analysis (filtered)</text>
    <line x1="510" y1="25" x2="545" y2="25" stroke="#6366f1" stroke-width="2"/>
    <text x="555" y="29" fill="#94a3b8" font-size="11">done</text>
    <text x="900" y="29" text-anchor="middle" fill="#94a3b8" font-size="11">协议: text/event-stream | 编码: UTF-8 | 重连: 自动</text>
  </g>
</svg>