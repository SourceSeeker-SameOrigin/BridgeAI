<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient>
    <marker id="arrowP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/></filter>
  </defs>
  <rect width="1000" height="400" fill="#0a0e1a"/>
  <text x="500" y="35" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="20" font-weight="700">MCP 连接器开发生命周期</text>

  <!-- Step 1 -->
  <rect x="15" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="67" y="96" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="20" font-weight="700">1</text>
  <text x="67" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">创建连接器类</text>
  <text x="67" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">connectors/xxx.py</text>
  <line x1="120" y1="110" x2="135" y2="110" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 2 -->
  <rect x="137" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="189" y="96" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="20" font-weight="700">2</text>
  <text x="189" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">继承基类</text>
  <text x="189" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">MCPConnector</text>
  <line x1="242" y1="110" x2="257" y2="110" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 3 -->
  <rect x="259" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="311" y="96" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="20" font-weight="700">3</text>
  <text x="311" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">实现 5 方法</text>
  <text x="311" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">connect/list/exec</text>
  <line x1="364" y1="110" x2="379" y2="110" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 4 -->
  <rect x="381" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="433" y="96" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="20" font-weight="700">4</text>
  <text x="433" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">注册类型</text>
  <text x="433" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">gateway.py</text>
  <line x1="486" y1="110" x2="501" y2="110" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 5 -->
  <rect x="503" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="555" y="96" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="20" font-weight="700">5</text>
  <text x="555" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">创建实例</text>
  <text x="555" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">POST /mcp API</text>
  <line x1="608" y1="110" x2="623" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 6 -->
  <rect x="625" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="677" y="96" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="20" font-weight="700">6</text>
  <text x="677" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">健康检查</text>
  <text x="677" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">health_check()</text>
  <line x1="730" y1="110" x2="745" y2="110" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 7 -->
  <rect x="747" y="70" width="105" height="80" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="799" y="96" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="20" font-weight="700">7</text>
  <text x="799" y="116" text-anchor="middle" fill="#f1f5f9" font-family="system-ui" font-size="10">执行工具</text>
  <text x="799" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="8">execute_tool()</text>
  <line x1="852" y1="110" x2="867" y2="110" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 8 -->
  <rect x="869" y="70" width="112" height="80" rx="12" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  <text x="925" y="96" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="700">8</text>
  <text x="925" y="116" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">审计日志</text>
  <text x="925" y="136" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="8">mcp_audit_logs</text>

  <!-- Detail: 5 methods -->
  <rect x="20" y="180" width="300" height="200" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="205" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="13" font-weight="600">MCPConnector 抽象基类 (5 方法)</text>
  <rect x="40" y="220" width="260" height="28" rx="6" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="238" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11">connect(config: dict) -> None</text>
  <rect x="40" y="255" width="260" height="28" rx="6" fill="#0a0e1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="273" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="11">disconnect() -> None</text>
  <rect x="40" y="290" width="260" height="28" rx="6" fill="#0a0e1a" stroke="#6366f1" stroke-width="1"/>
  <text x="170" y="308" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="11">list_tools() -> list[ToolDefinition]</text>
  <rect x="40" y="325" width="260" height="28" rx="6" fill="#0a0e1a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="170" y="343" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="11">execute_tool(name, args) -> ToolResult</text>
  <rect x="40" y="360" width="260" height="28" rx="6" fill="#0a0e1a" stroke="#ec4899" stroke-width="1"/>
  <text x="170" y="378" text-anchor="middle" fill="#ec4899" font-family="system-ui" font-size="11">health_check() -> bool</text>

  <!-- Detail: Gateway flow -->
  <rect x="350" y="180" width="310" height="200" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1"/>
  <text x="505" y="205" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="600">MCP Gateway 执行流</text>
  <text x="370" y="233" fill="#f1f5f9" font-family="system-ui" font-size="11">1. 查找连接器 (connector_id)</text>
  <text x="370" y="255" fill="#f1f5f9" font-family="system-ui" font-size="11">2. 权限检查 (Agent 绑定?)</text>
  <text x="370" y="277" fill="#f1f5f9" font-family="system-ui" font-size="11">3. 参数校验 (JSON Schema)</text>
  <text x="370" y="299" fill="#f1f5f9" font-family="system-ui" font-size="11">4. 执行工具 (execute_tool)</text>
  <text x="370" y="321" fill="#f1f5f9" font-family="system-ui" font-size="11">5. 脱敏处理 (手机/身份证/银行卡)</text>
  <text x="370" y="343" fill="#f1f5f9" font-family="system-ui" font-size="11">6. 审计日志 (request/response/耗时)</text>
  <text x="370" y="365" fill="#22c55e" font-family="system-ui" font-size="11">7. 返回 ToolResult → Agent</text>

  <!-- Detail: Available connectors -->
  <rect x="690" y="180" width="290" height="200" rx="12" fill="#111827" stroke="#94a3b8" stroke-width="1"/>
  <text x="835" y="205" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="600">已有连接器类型</text>
  <rect x="710" y="220" width="250" height="28" rx="6" fill="#0a0e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="835" y="238" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11">mysql / postgresql / database</text>
  <rect x="710" y="258" width="250" height="28" rx="6" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="835" y="276" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="11">http_api / http</text>
  <rect x="710" y="296" width="250" height="28" rx="6" fill="#0a0e1a" stroke="#6366f1" stroke-width="1"/>
  <text x="835" y="314" text-anchor="middle" fill="#6366f1" font-family="system-ui" font-size="11">feishu / lark</text>
  <rect x="710" y="334" width="250" height="28" rx="6" fill="#0a0e1a" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="835" y="352" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">your_type (自定义)</text>
