<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ri-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="ri-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="ri-arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6366f1"/>
    </marker>
    <marker id="ri-arrow-err" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="url(#ri-bg)"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">RAG 文档摄入流程</text>
  <text x="600" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Document Ingestion Pipeline</text>

  <!-- Step 1: Upload -->
  <g transform="translate(30, 140)">
    <rect width="110" height="80" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="55" y="35" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F4C1;</text>
    <text x="55" y="58" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Upload</text>
    <text x="55" y="72" text-anchor="middle" fill="#94a3b8" font-size="10">文件上传</text>
  </g>

  <line x1="145" y1="180" x2="175" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ri-arrow)"/>

  <!-- Step 2: Parser Selection -->
  <g transform="translate(185, 115)">
    <rect width="160" height="130" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="80" y="25" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="700">解析器选择</text>
    <line x1="10" y1="35" x2="150" y2="35" stroke="rgba(148,163,184,0.15)"/>
    <!-- 5 parser types -->
    <rect x="12" y="44" width="60" height="20" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
    <text x="42" y="58" text-anchor="middle" fill="#ef4444" font-size="10">PDF</text>
    <rect x="80" y="44" width="68" height="20" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="114" y="58" text-anchor="middle" fill="#3b82f6" font-size="10">DOCX</text>
    <rect x="12" y="70" width="60" height="20" rx="6" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="0.8"/>
    <text x="42" y="84" text-anchor="middle" fill="#22c55e" font-size="10">Excel</text>
    <rect x="80" y="70" width="68" height="20" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="114" y="84" text-anchor="middle" fill="#f59e0b" font-size="10">MD</text>
    <rect x="12" y="96" width="60" height="20" rx="6" fill="#94a3b8" opacity="0.12" stroke="#94a3b8" stroke-width="0.8"/>
    <text x="42" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">TXT</text>
  </g>

  <line x1="350" y1="180" x2="385" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ri-arrow)"/>

  <!-- Step 3: Text Chunking -->
  <g transform="translate(395, 130)">
    <rect width="170" height="100" rx="12" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="85" y="28" text-anchor="middle" fill="#6366f1" font-size="22">&#x2702;</text>
    <text x="85" y="50" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">文本切分</text>
    <text x="85" y="68" text-anchor="middle" fill="#94a3b8" font-size="11">chunk_size = 512</text>
    <text x="85" y="84" text-anchor="middle" fill="#94a3b8" font-size="11">overlap = 64</text>
  </g>

  <line x1="570" y1="180" x2="605" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ri-arrow)"/>

  <!-- Step 4: Vectorize -->
  <g transform="translate(615, 130)">
    <rect width="170" height="100" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="85" y="28" text-anchor="middle" fill="#8b5cf6" font-size="22">&#x1F9EE;</text>
    <text x="85" y="50" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">向量化</text>
    <text x="85" y="68" text-anchor="middle" fill="#94a3b8" font-size="11">HashingVectorizer</text>
    <text x="85" y="84" text-anchor="middle" fill="#94a3b8" font-size="11">生成 embedding</text>
  </g>

  <line x1="790" y1="180" x2="825" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ri-arrow)"/>

  <!-- Step 5: pgvector Storage -->
  <g transform="translate(835, 130)">
    <rect width="170" height="100" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="85" y="28" text-anchor="middle" fill="#3b82f6" font-size="22">&#x1F5C4;</text>
    <text x="85" y="50" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">pgvector 存储</text>
    <text x="85" y="68" text-anchor="middle" fill="#94a3b8" font-size="11">PostgreSQL + pgvector</text>
    <text x="85" y="84" text-anchor="middle" fill="#94a3b8" font-size="11">索引 &amp; 持久化</text>
  </g>

  <line x1="1010" y1="180" x2="1060" y2="180" stroke="#6366f1" stroke-width="2" marker-end="url(#ri-arrow)"/>

  <!-- Step 6: Ready -->
  <g transform="translate(1070, 148)">
    <rect width="100" height="65" rx="12" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2" filter="url(#ri-shadow)"/>
    <text x="50" y="30" text-anchor="middle" fill="#22c55e" font-size="22">&#x2713;</text>
    <text x="50" y="50" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">Ready</text>
  </g>

  <!-- Error path -->
  <g transform="translate(100, 310)">
    <rect width="960" height="70" rx="12" fill="#ef4444" opacity="0.05" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="480" y="28" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="600">Error Path</text>
    <text x="480" y="50" text-anchor="middle" fill="#94a3b8" font-size="12">任何步骤失败 → status = error → 回滚已处理数据 → 通知用户重试</text>
  </g>

  <!-- Error arrows from each step down -->
  <line x1="265" y1="245" x2="265" y2="310" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="480" y1="230" x2="480" y2="310" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="700" y1="230" x2="700" y2="310" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="920" y1="230" x2="920" y2="310" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Pipeline label -->
  <g transform="translate(30, 420)">
    <rect width="1140" height="55" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
    <text x="570" y="24" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">支持格式: PDF, DOCX, XLSX, Markdown, Plain Text</text>
    <text x="570" y="44" text-anchor="middle" fill="#94a3b8" font-size="11">异步处理 | Celery Worker | 状态追踪: pending → processing → completed / error</text>
  </g>
</svg>