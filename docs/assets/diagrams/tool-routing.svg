<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <filter id="tr-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="tr-arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="tr-arr-g" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="tr-arr-r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#tr-bg)"/>

  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">工具路由流程</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Tool Routing Decision Flow</text>

  <!-- Input: tool_name -->
  <g transform="translate(450, 105)">
    <rect x="-75" y="-22" width="150" height="44" rx="22" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="600">tool_name</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="130" x2="450" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tr-arr)"/>

  <!-- Decision 1: delegate_task? -->
  <g transform="translate(450, 200)">
    <polygon points="0,-35 120,0 0,35 -120,0" fill="#111827" stroke="#f59e0b" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">"delegate_task"</text>
    <text x="0" y="12" text-anchor="middle" fill="#f59e0b" font-size="12">?</text>
  </g>

  <!-- Yes right to AgentCollaborator -->
  <line x1="570" y1="200" x2="680" y2="200" stroke="#22c55e" stroke-width="1.5" marker-end="url(#tr-arr-g)"/>
  <text x="610" y="192" fill="#22c55e" font-size="11">Yes</text>
  <g transform="translate(790, 200)">
    <rect x="-95" y="-25" width="190" height="50" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-3" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">AgentCollaborator</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-size="10">委托代理执行任务</text>
  </g>

  <!-- No down -->
  <line x1="450" y1="235" x2="450" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tr-arr)"/>
  <text x="462" y="258" fill="#ef4444" font-size="11">No</text>

  <!-- Decision 2: plugin_* ? -->
  <g transform="translate(450, 310)">
    <polygon points="0,-35 120,0 0,35 -120,0" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">"plugin_*"</text>
    <text x="0" y="12" text-anchor="middle" fill="#8b5cf6" font-size="12">?</text>
  </g>

  <!-- Yes right to PluginRegistry -->
  <line x1="570" y1="310" x2="680" y2="310" stroke="#22c55e" stroke-width="1.5" marker-end="url(#tr-arr-g)"/>
  <text x="610" y="302" fill="#22c55e" font-size="11">Yes</text>
  <g transform="translate(790, 310)">
    <rect x="-95" y="-25" width="190" height="50" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-3" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="600">PluginRegistry</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-size="10">match name → execute_tool</text>
  </g>

  <!-- No down -->
  <line x1="450" y1="345" x2="450" y2="385" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tr-arr)"/>
  <text x="462" y="368" fill="#ef4444" font-size="11">No</text>

  <!-- Decision 3: MCP prefix? -->
  <g transform="translate(450, 420)">
    <polygon points="0,-35 130,0 0,35 -130,0" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-5" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">MCP connector</text>
    <text x="0" y="12" text-anchor="middle" fill="#3b82f6" font-size="12">prefix?</text>
  </g>

  <!-- Yes right to MCPGateway -->
  <line x1="580" y1="420" x2="680" y2="420" stroke="#22c55e" stroke-width="1.5" marker-end="url(#tr-arr-g)"/>
  <text x="618" y="412" fill="#22c55e" font-size="11">Yes</text>
  <g transform="translate(790, 420)">
    <rect x="-95" y="-25" width="190" height="50" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-3" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">MCPGateway</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-size="10">route → execute_tool</text>
  </g>

  <!-- No down to Error -->
  <line x1="450" y1="455" x2="450" y2="505" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#tr-arr-r)"/>
  <text x="462" y="480" fill="#ef4444" font-size="11">No</text>

  <!-- Error box -->
  <g transform="translate(450, 540)">
    <rect x="-100" y="-25" width="200" height="50" rx="12" fill="#111827" stroke="#ef4444" stroke-width="2" filter="url(#tr-shadow)"/>
    <text x="0" y="-3" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600">Return Error</text>
    <text x="0" y="15" text-anchor="middle" fill="#94a3b8" font-size="10">Unknown tool: {tool_name}</text>
  </g>

  <!-- Left example labels -->
  <g transform="translate(85, 200)">
    <rect x="-60" y="-14" width="120" height="28" rx="6" fill="#1e293b"/>
    <text x="0" y="4" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="monospace">delegate_task</text>
  </g>
  <g transform="translate(85, 310)">
    <rect x="-60" y="-14" width="120" height="28" rx="6" fill="#1e293b"/>
    <text x="0" y="4" text-anchor="middle" fill="#8b5cf6" font-size="10" font-family="monospace">plugin_weather</text>
  </g>
  <g transform="translate(85, 420)">
    <rect x="-60" y="-14" width="120" height="28" rx="6" fill="#1e293b"/>
    <text x="0" y="4" text-anchor="middle" fill="#3b82f6" font-size="10" font-family="monospace">mcp__fs__read</text>
  </g>
</svg>