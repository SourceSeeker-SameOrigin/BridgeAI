<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ma-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="ma-parent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ma-child" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.06"/>
    </linearGradient>
    <marker id="ma-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="ma-arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="ma-arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <filter id="ma-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="url(#ma-bg)"/>
  <text x="500" y="45" fill="#f1f5f9" font-size="22" font-weight="700" text-anchor="middle">多 Agent 协作架构</text>
  <text x="500" y="70" fill="#94a3b8" font-size="13" text-anchor="middle">Parent-Child Delegation / Parallel Execution</text>

  <!-- Parent Agent center -->
  <rect x="350" y="180" width="300" height="140" rx="12" fill="url(#ma-parent)" stroke="#6366f1" stroke-opacity="0.6" stroke-width="2"/>
  <circle cx="390" cy="220" r="18" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.5"/>
  <text x="390" y="225" fill="#6366f1" font-size="16" text-anchor="middle" font-weight="700">P</text>
  <text x="500" y="225" fill="#f1f5f9" font-size="16" font-weight="700" text-anchor="middle">Parent Agent</text>
  <text x="500" y="250" fill="#94a3b8" font-size="12" text-anchor="middle">Orchestrator / Coordinator</text>
  <rect x="380" y="268" width="240" height="36" rx="6" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="500" y="291" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">run_parallel_tasks (asyncio.gather)</text>

  <!-- Child Agent 1 - Left -->
  <rect x="40" y="420" width="240" height="130" rx="12" fill="url(#ma-child)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="80" cy="455" r="14" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="80" y="460" fill="#8b5cf6" font-size="13" text-anchor="middle" font-weight="700">C1</text>
  <text x="160" y="458" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">Child Agent 1</text>
  <text x="160" y="480" fill="#94a3b8" font-size="11" text-anchor="middle">研究 &amp; 信息检索</text>
  <rect x="60" y="498" width="200" height="28" rx="6" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="160" y="517" fill="#22c55e" font-size="10" text-anchor="middle">delegate_by_name: "researcher"</text>

  <!-- Child Agent 2 - Center -->
  <rect x="380" y="420" width="240" height="130" rx="12" fill="url(#ma-child)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="420" cy="455" r="14" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="420" y="460" fill="#8b5cf6" font-size="13" text-anchor="middle" font-weight="700">C2</text>
  <text x="500" y="458" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">Child Agent 2</text>
  <text x="500" y="480" fill="#94a3b8" font-size="11" text-anchor="middle">数据分析 &amp; 处理</text>
  <rect x="400" y="498" width="200" height="28" rx="6" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="500" y="517" fill="#22c55e" font-size="10" text-anchor="middle">delegate_by_name: "analyst"</text>

  <!-- Child Agent 3 - Right -->
  <rect x="720" y="420" width="240" height="130" rx="12" fill="url(#ma-child)" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="760" cy="455" r="14" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.5"/>
  <text x="760" y="460" fill="#8b5cf6" font-size="13" text-anchor="middle" font-weight="700">C3</text>
  <text x="840" y="458" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">Child Agent 3</text>
  <text x="840" y="480" fill="#94a3b8" font-size="11" text-anchor="middle">内容生成 &amp; 编写</text>
  <rect x="740" y="498" width="200" height="28" rx="6" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="840" y="517" fill="#22c55e" font-size="10" text-anchor="middle">delegate_by_name: "writer"</text>

  <!-- Arrows from Parent to Children -->
  <path d="M400 320 L200 420" stroke="#6366f1" stroke-width="2" marker-end="url(#ma-arr)" fill="none"/>
  <path d="M500 320 L500 420" stroke="#6366f1" stroke-width="2" marker-end="url(#ma-arr)" fill="none"/>
  <path d="M600 320 L800 420" stroke="#6366f1" stroke-width="2" marker-end="url(#ma-arr)" fill="none"/>

  <!-- Labels on arrows -->
  <text x="270" y="365" fill="#6366f1" font-size="10" text-anchor="middle" transform="rotate(-30, 270, 365)">delegate_task</text>
  <text x="520" y="375" fill="#6366f1" font-size="10" text-anchor="start">delegate_task</text>
  <text x="730" y="365" fill="#6366f1" font-size="10" text-anchor="middle" transform="rotate(30, 730, 365)">delegate_task</text>

  <!-- Max depth badge -->
  <rect x="770" y="180" width="180" height="50" rx="10" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="860" y="200" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="700">MAX DEPTH</text>
  <text x="860" y="220" fill="#ef4444" font-size="18" text-anchor="middle" font-weight="700">3</text>

  <!-- Legend -->
  <rect x="40" y="120" width="200" height="80" rx="8" fill="#111827" stroke="rgba(148,163,184,0.15)"/>
  <text x="55" y="142" fill="#94a3b8" font-size="11" font-weight="600">Flow Pattern</text>
  <line x1="55" y1="158" x2="85" y2="158" stroke="#6366f1" stroke-width="2" marker-end="url(#ma-arr)"/>
  <text x="95" y="162" fill="#94a3b8" font-size="10">delegate_task</text>
  <line x1="55" y1="178" x2="85" y2="178" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="95" y="182" fill="#94a3b8" font-size="10">result return</text>

  <!-- Return arrows (dashed) -->
  <path d="M180 420 L380 320" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <path d="M480 420 L480 320" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <path d="M780 420 L580 320" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
</svg>