<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="mr-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="mr-primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="mr-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mr-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="mr-arrow" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <marker id="mr-arrow-green" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#22c55e"/>
    </marker>
    <marker id="mr-arrow-warn" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#mr-bg)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">5 层模型路由决策流程</text>
  <text x="600" y="60" text-anchor="middle" fill="#94a3b8" font-size="13">Model Router - 5-Layer Decision Pipeline</text>

  <!-- Layer bands -->
  <rect x="30" y="75" width="1140" height="108" rx="8" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="50" y="96" fill="#6366f1" font-size="11" font-weight="600" opacity="0.7">LAYER 1</text>

  <rect x="30" y="190" width="1140" height="108" rx="8" fill="#8b5cf6" opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.15"/>
  <text x="50" y="211" fill="#8b5cf6" font-size="11" font-weight="600" opacity="0.7">LAYER 2</text>

  <rect x="30" y="305" width="1140" height="95" rx="8" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="50" y="326" fill="#6366f1" font-size="11" font-weight="600" opacity="0.7">LAYER 3</text>

  <rect x="30" y="407" width="1140" height="95" rx="8" fill="#8b5cf6" opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.15"/>
  <text x="50" y="428" fill="#8b5cf6" font-size="11" font-weight="600" opacity="0.7">LAYER 4</text>

  <rect x="30" y="509" width="1140" height="95" rx="8" fill="#6366f1" opacity="0.06" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="50" y="530" fill="#6366f1" font-size="11" font-weight="600" opacity="0.7">LAYER 5</text>

  <!-- START node -->
  <rect x="230" y="85" width="80" height="32" rx="16" fill="url(#mr-primary)" filter="url(#mr-shadow)"/>
  <text x="270" y="106" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Start</text>

  <!-- Arrow Start -> Diamond 1 -->
  <line x1="310" y1="101" x2="370" y2="129" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#mr-arrow)"/>

  <!-- Diamond 1: 首条消息? -->
  <g transform="translate(440,129)">
    <polygon points="0,-28 70,0 0,28 -70,0" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#mr-shadow)"/>
    <text x="0" y="1" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">首条消息?</text>
  </g>

  <!-- Yes -> 默认模型 -->
  <line x1="510" y1="129" x2="620" y2="129" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mr-arrow-green)"/>
  <text x="560" y="122" text-anchor="middle" fill="#22c55e" font-size="11">Yes</text>
  <rect x="630" y="111" width="140" height="36" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.2" filter="url(#mr-shadow)"/>
  <text x="700" y="134" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">默认模型</text>

  <!-- No -> down -->
  <line x1="440" y1="157" x2="440" y2="215" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#mr-arrow)"/>
  <text x="452" y="185" fill="#94a3b8" font-size="11">No</text>

  <!-- Diamond 2a: 意图=数据分析/代码? -->
  <g transform="translate(440,244)">
    <polygon points="0,-28 90,0 0,28 -90,0" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#mr-shadow)"/>
    <text x="0" y="-4" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">意图=数据分析</text>
    <text x="0" y="10" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">/代码?</text>
  </g>

  <!-- Yes -> 升级模型 -->
  <line x1="530" y1="244" x2="630" y2="244" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mr-arrow-green)"/>
  <text x="575" y="237" text-anchor="middle" fill="#22c55e" font-size="11">Yes</text>
  <rect x="640" y="226" width="140" height="36" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.2" filter="url(#mr-shadow)"/>
  <text x="710" y="249" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">升级模型</text>

  <!-- No -> Diamond 2b -->
  <line x1="440" y1="272" x2="440" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="452" y="295" fill="#94a3b8" font-size="11">No</text>

  <!-- Branch: 意图=闲聊? (inline on layer 2) -->
  <line x1="350" y1="244" x2="260" y2="244" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <rect x="120" y="226" width="140" height="36" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" filter="url(#mr-shadow)"/>
  <text x="190" y="242" text-anchor="middle" fill="#f59e0b" font-size="11">意图=闲聊?</text>
  <text x="190" y="256" text-anchor="middle" fill="#f59e0b" font-size="11">→ 降级模型</text>

  <!-- Diamond 3: VIP用户? -->
  <g transform="translate(440,349)">
    <polygon points="0,-28 70,0 0,28 -70,0" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#mr-shadow)"/>
    <text x="0" y="1" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">VIP用户?</text>
  </g>

  <!-- Yes -> 高端模型 (stub) -->
  <line x1="510" y1="349" x2="630" y2="349" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mr-arrow-green)"/>
  <text x="565" y="342" text-anchor="middle" fill="#22c55e" font-size="11">Yes</text>
  <rect x="640" y="331" width="160" height="36" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.2" filter="url(#mr-shadow)"/>
  <text x="720" y="354" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">高端模型 (stub)</text>

  <!-- No -> down -->
  <line x1="440" y1="377" x2="440" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#mr-arrow)"/>
  <text x="452" y="405" fill="#94a3b8" font-size="11">No</text>

  <!-- Diamond 4 -->
  <g transform="translate(440,458)">
    <polygon points="0,-28 100,0 0,28 -100,0" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#mr-shadow)"/>
    <text x="0" y="-4" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">对话&lt;3轮 +</text>
    <text x="0" y="10" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">简单意图?</text>
  </g>

  <line x1="540" y1="458" x2="630" y2="458" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mr-arrow-green)"/>
  <text x="580" y="451" text-anchor="middle" fill="#22c55e" font-size="11">Yes</text>
  <rect x="640" y="440" width="140" height="36" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.2" filter="url(#mr-shadow)"/>
  <text x="710" y="463" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">最快模型</text>

  <!-- No -> down -->
  <line x1="440" y1="486" x2="440" y2="535" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#mr-arrow)"/>
  <text x="452" y="512" fill="#94a3b8" font-size="11">No</text>

  <!-- Diamond 5 -->
  <g transform="translate(440,563)">
    <polygon points="0,-28 105,0 0,28 -105,0" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#mr-shadow)"/>
    <text x="0" y="-4" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">成本优化开启</text>
    <text x="0" y="10" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">+ 低复杂度?</text>
  </g>

  <line x1="545" y1="563" x2="630" y2="563" stroke="#22c55e" stroke-width="1.5" marker-end="url(#mr-arrow-green)"/>
  <text x="583" y="556" text-anchor="middle" fill="#22c55e" font-size="11">Yes</text>
  <rect x="640" y="545" width="140" height="36" rx="12" fill="#111827" stroke="#22c55e" stroke-width="1.2" filter="url(#mr-shadow)"/>
  <text x="710" y="568" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">降级模型</text>

  <!-- No -> End output -->
  <line x1="440" y1="591" x2="440" y2="630" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#mr-arrow)"/>

  <!-- All Yes results also connect to End -->
  <!-- End output box -->
  <rect x="310" y="633" width="260" height="44" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2" filter="url(#mr-glow)"/>
  <text x="440" y="652" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">OUTPUT</text>
  <text x="440" y="669" text-anchor="middle" fill="#94a3b8" font-size="11">(provider, model, temperature)</text>

  <!-- Right side results connect down to end -->
  <path d="M770,147 L770,620 Q770,633 757,633 L570,633" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <path d="M780,262 L780,620 Q780,639 767,639 L570,639" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <path d="M800,367 L800,620 Q800,645 787,645 L570,645" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <path d="M780,476 L790,620 Q790,651 777,651 L570,651" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Legend -->
  <g transform="translate(920,85)">
    <rect x="0" y="0" width="230" height="100" rx="12" fill="#111827" stroke="rgba(148,163,184,0.15)" stroke-width="1"/>
    <text x="115" y="22" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">图例</text>
    <polygon points="30,45 50,35 70,45 50,55" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="85" y="49" fill="#f59e0b" font-size="11">决策节点</text>
    <rect x="20" y="63" width="60" height="20" rx="10" fill="#111827" stroke="#22c55e" stroke-width="1.2"/>
    <text x="85" y="77" fill="#22c55e" font-size="11">输出结果</text>
  </g>
</svg>