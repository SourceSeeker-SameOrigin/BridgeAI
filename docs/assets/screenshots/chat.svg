<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="1200" height="800" rx="8" fill="#0a0e1a"/>
  <rect width="1200" height="36" rx="8" fill="#111827"/>
  <rect y="28" width="1200" height="8" fill="#111827"/>
  <circle cx="20" cy="18" r="6" fill="#ef4444"/>
  <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="18" r="6" fill="#22c55e"/>
  <text x="600" y="22" text-anchor="middle" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">BridgeAI - AI Chat</text>

  <!-- Sidebar -->
  <rect x="0" y="36" width="220" height="764" fill="#111827"/>
  <circle cx="42" cy="72" r="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="42" y="76" text-anchor="middle" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#6366f1" font-weight="700">B</text>
  <text x="68" y="77" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#f1f5f9">BridgeAI</text>

  <!-- Nav - Chat active -->
  <text x="36" y="131" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="15">&#x1F4CA;</text>
  <text x="58" y="132" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">仪表盘</text>

  <rect x="12" y="146" width="196" height="38" rx="8" fill="#6366f1" opacity="0.15"/>
  <rect x="16" y="146" width="3" height="38" rx="1.5" fill="#6366f1"/>
  <text x="36" y="169" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="15">&#x1F4AC;</text>
  <text x="58" y="170" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#c7d2fe">对话</text>

  <text x="36" y="207" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="15">&#x1F916;</text>
  <text x="58" y="208" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">Agent 管理</text>

  <!-- Conversation list area -->
  <line x1="0" y1="260" x2="220" y2="260" stroke="#1e293b" stroke-width="0.5"/>
  <text x="20" y="282" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#64748b">最近对话</text>

  <!-- Conversation items -->
  <rect x="12" y="294" width="196" height="50" rx="6" fill="#1e293b"/>
  <text x="24" y="314" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#f1f5f9">跨境电商选品分析</text>
  <text x="24" y="332" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">刚刚 - 客服助手</text>

  <rect x="12" y="352" width="196" height="50" rx="6" fill="transparent"/>
  <text x="24" y="372" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">Q1 销售数据查询</text>
  <text x="24" y="390" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">2小时前 - 数据分析师</text>

  <rect x="12" y="410" width="196" height="50" rx="6" fill="transparent"/>
  <text x="24" y="430" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">合同条款审核</text>
  <text x="24" y="448" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">昨天 - 法律顾问</text>

  <!-- Chat area -->
  <!-- Chat header -->
  <rect x="220" y="36" width="980" height="52" fill="#0f1320" stroke="#1e293b" stroke-width="0 0 1 0"/>
  <line x1="220" y1="88" x2="1200" y2="88" stroke="#1e293b" stroke-width="1"/>
  <circle cx="252" cy="62" r="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="252" y="67" text-anchor="middle" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="14">&#x1F916;</text>
  <text x="278" y="57" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">客服助手</text>
  <text x="278" y="73" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">DeepSeek V3 - 在线</text>
  <circle cx="360" cy="69" r="3" fill="#22c55e"/>

  <!-- Messages area -->
  <!-- User message 1 -->
  <g transform="translate(0, 110)">
    <rect x="680" y="0" width="480" height="50" rx="12" fill="url(#userBubble)"/>
    <text x="700" y="22" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#ffffff">帮我分析一下最近热销的跨境电商产品类目，</text>
    <text x="700" y="40" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#ffffff">重点关注北美市场的消费趋势。</text>
    <text x="1150" y="66" text-anchor="end" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">14:30</text>
  </g>

  <!-- AI response 1 -->
  <g transform="translate(0, 200)">
    <circle cx="252" cy="12" r="14" fill="#1e1b4b"/>
    <text x="252" y="17" text-anchor="middle" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12">&#x1F916;</text>
    <rect x="278" y="0" width="600" height="200" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="298" y="24" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#e2e8f0">根据最新数据分析，北美市场的热销品类如下：</text>
    <text x="298" y="52" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#c7d2fe" font-weight="600">Top 5 品类排名：</text>
    <text x="318" y="76" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">1. 智能家居设备 - 增长率 +42%</text>
    <text x="318" y="98" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">2. 户外运动装备 - 增长率 +35%</text>
    <text x="318" y="120" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">3. 宠物用品 - 增长率 +28%</text>
    <text x="318" y="142" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">4. 健康保健品 - 增长率 +24%</text>
    <text x="318" y="164" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12" fill="#cbd5e1">5. 个人护理电器 - 增长率 +21%</text>
    <text x="298" y="190" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">数据来源: MCP 连接器 - 销售数据库</text>
    <!-- Tool call badge -->
    <rect x="298" y="206" width="120" height="22" rx="11" fill="#6366f1" opacity="0.15"/>
    <text x="314" y="221" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#a5b4fc">&#x1F50C; MCP: 数据库查询</text>
    <rect x="428" y="206" width="100" height="22" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <text x="444" y="221" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#c4b5fd">&#x1F4DA; RAG 检索</text>
    <text x="278" y="244" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">14:30 - 1,234 tokens</text>
  </g>

  <!-- User message 2 -->
  <g transform="translate(0, 468)">
    <rect x="750" y="0" width="410" height="34" rx="12" fill="url(#userBubble)"/>
    <text x="770" y="22" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#ffffff">智能家居设备中哪些子品类利润率最高？</text>
    <text x="1150" y="50" text-anchor="end" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">14:31</text>
  </g>

  <!-- AI typing indicator -->
  <g transform="translate(0, 530)">
    <circle cx="252" cy="12" r="14" fill="#1e1b4b"/>
    <text x="252" y="17" text-anchor="middle" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="12">&#x1F916;</text>
    <rect x="278" y="0" width="120" height="34" rx="12" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <circle cx="306" cy="17" r="4" fill="#6366f1" opacity="0.4"/>
    <circle cx="322" cy="17" r="4" fill="#6366f1" opacity="0.6"/>
    <circle cx="338" cy="17" r="4" fill="#6366f1" opacity="0.8"/>
  </g>

  <!-- Input area -->
  <rect x="220" y="720" width="980" height="80" fill="#0f1320"/>
  <line x1="220" y1="720" x2="1200" y2="720" stroke="#1e293b" stroke-width="1"/>
  <rect x="248" y="736" width="880" height="48" rx="24" fill="#111827" stroke="#1e293b" stroke-width="1"/>
  <text x="280" y="764" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="13" fill="#475569">输入消息...</text>
  <!-- Send button -->
  <rect x="1098" y="744" width="32" height="32" rx="16" fill="#6366f1"/>
  <polygon points="1108,760 1120,756 1108,764" fill="#ffffff"/>
  <!-- Attachment button -->
  <text x="1060" y="765" font-family="system-ui, Helvetica, Arial, sans-serif" font-size="18" fill="#475569">&#x1F4CE;</text>
</svg>